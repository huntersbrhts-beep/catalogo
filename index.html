<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Lanche - Catálogo & Admin Unificado</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" href="data:,">

    <style>
        .zoom-modal { display:none; }
        .zoom-modal.active { display:flex; }

        .tab-content { display:none; }
        .tab-content.active { display:block; }

        .categoria-ativa{
            background:#f59e0b !important;
            color:white !important;
            border-color:#f59e0b !important;
        }
    </style>
</head>

<body class="bg-gray-50 font-sans flex flex-col min-h-screen">

<header class="bg-amber-500 text-white shadow-md sticky top-0 z-40">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">

        <h1 class="text-2xl font-bold tracking-wider cursor-pointer"
            onclick="mudarAba('catalogo')">
            BIG LANCHE
        </h1>

        <div class="flex items-center gap-4">

            <button onclick="mudarAba('admin')"
                    class="text-sm bg-amber-600 hover:bg-amber-700 px-3 py-2 rounded-lg font-semibold transition flex items-center gap-2">
                <i class="fas fa-lock"></i>
                Painel Admin
            </button>

            <button onclick="toggleCarrinho()"
                    class="relative p-2 bg-amber-600 rounded-full hover:bg-amber-700 transition">

                <i class="fas fa-shopping-cart text-xl"></i>

                <span id="cart-count"
                      class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold hidden">
                    0
                </span>
            </button>

        </div>
    </div>
</header>

<!-- CATÁLOGO -->
<main id="aba-catalogo"
      class="tab-content active container mx-auto p-4 flex-grow">

    <div class="bg-orange-100 border-l-4 border-orange-500 text-orange-700 p-4 mb-6 rounded shadow-sm">
        <p class="font-bold">Bem-vindo ao Big Lanche!</p>

        <p class="text-sm">
            Monte seu carrinho clicando nos produtos e envie o pedido direto pelo nosso WhatsApp.
        </p>
    </div>

    <!-- CATEGORIAS -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">

        <button onclick="filtrarCategoria('todos',this)"
                class="categoria-btn categoria-ativa bg-white border p-3 rounded-xl shadow font-bold hover:bg-gray-50 transition">
            🍔 Todos
        </button>

        <button onclick="filtrarCategoria('hamburguer',this)"
                class="categoria-btn bg-white border p-3 rounded-xl shadow hover:bg-gray-50 transition">
            🍔 Hambúrgueres
        </button>

        <button onclick="filtrarCategoria('bebida',this)"
                class="categoria-btn bg-white border p-3 rounded-xl shadow hover:bg-gray-50 transition">
            🥤 Bebidas
        </button>

        <button onclick="filtrarCategoria('combo',this)"
                class="categoria-btn bg-white border p-3 rounded-xl shadow hover:bg-gray-50 transition">
            🍟 Combos
        </button>

    </div>

    <!-- PRODUTOS -->
    <div id="grid-produtos"
         class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

        <div class="col-span-full text-center py-12 text-gray-500">
            <i class="fas fa-spinner fa-spin text-3xl mb-2"></i>
            <p>Carregando cardápio...</p>
        </div>

    </div>

</main>

<!-- ADMIN -->
<main id="aba-admin"
      class="tab-content container mx-auto p-4 flex-grow">

    <div class="max-w-2xl mx-auto mt-6">

        <button onclick="mudarAba('catalogo')"
                class="mb-4 text-amber-600 hover:text-amber-700 font-semibold flex items-center gap-1">

            <i class="fas fa-arrow-left"></i>
            Voltar para o Catálogo
        </button>

        <!-- LOGIN -->
        <div id="secao-login"
             class="bg-white p-6 rounded-xl shadow-md border border-gray-200">

            <h2 class="text-xl font-bold mb-4 text-center text-gray-800">
                Login do Administrador
            </h2>

            <div class="space-y-3">

                <input type="email"
                       id="login-email"
                       placeholder="Seu e-mail cadastrado"
                       class="w-full p-2 border rounded focus:outline-amber-500">

                <input type="password"
                       id="login-senha"
                       placeholder="Sua senha"
                       class="w-full p-2 border rounded focus:outline-amber-500">

                <button onclick="fazerLogin()"
                        class="w-full bg-amber-500 text-white p-2 rounded font-bold hover:bg-amber-600 transition">

                    Entrar no Painel
                </button>

            </div>
        </div>

        <!-- PAINEL -->
        <div id="secao-admin-painel"
             class="bg-white p-6 rounded-xl shadow-md border border-gray-200 hidden">

            <div class="flex justify-between items-center mb-6 border-b pb-3">

                <div>
                    <h2 class="text-2xl font-bold text-gray-800">
                        Novo Produto
                    </h2>

                    <p class="text-xs text-green-600 font-semibold">
                        <i class="fas fa-check-circle"></i>
                        Autenticado via Supabase
                    </p>
                </div>

                <button onclick="fazerLogout()"
                        class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-1 rounded text-sm font-semibold transition">

                    Sair
                </button>

            </div>

            <form id="form-produto"
                  onsubmit="salvarProduto(event)"
                  class="space-y-4">

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Nome
                    </label>

                    <input type="text"
                           id="prod-nome"
                           required
                           class="w-full p-2 border rounded focus:outline-amber-500">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Descrição
                    </label>

                    <textarea id="prod-descricao"
                              rows="3"
                              class="w-full p-2 border rounded focus:outline-amber-500"></textarea>
                </div>

                <!-- CATEGORIA -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Categoria
                    </label>

                    <select id="prod-categoria"
                            class="w-full p-2 border rounded focus:outline-amber-500">

                        <option value="hamburguer">Hambúrguer</option>
                        <option value="bebida">Bebida</option>
                        <option value="combo">Combo</option>

                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Preço
                    </label>

                    <input type="number"
                           step="0.01"
                           id="prod-preco"
                           required
                           class="w-full p-2 border rounded focus:outline-amber-500">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Imagem
                    </label>

                    <input type="file"
                           id="prod-imagem"
                           accept="image/*"
                           required
                           class="w-full p-2 border rounded bg-gray-50">
                </div>

                <button type="submit"
                        id="btn-cadastrar"
                        class="w-full bg-green-500 text-white p-3 rounded-lg font-bold hover:bg-green-600 transition">

                    <i class="fas fa-cloud-upload-alt"></i>
                    Publicar no Catálogo
                </button>

            </form>

        </div>

    </div>
</main>

<!-- CARRINHO -->
<div id="sidebar-carrinho"
     class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">

    <div class="p-4 bg-gray-100 flex justify-between items-center border-b">

        <h3 class="text-lg font-bold text-gray-800">
            Seu Pedido
        </h3>

        <button onclick="toggleCarrinho()"
                class="text-2xl font-bold">
            ×
        </button>
    </div>

    <div id="itens-carrinho"
         class="p-4 flex-grow overflow-y-auto space-y-4">

        <p class="text-center text-gray-400 my-8">
            Seu carrinho está vazio.
        </p>

    </div>

    <div class="p-4 border-t bg-gray-50 space-y-3">

        <div class="flex justify-between font-bold text-lg">
            <span>Total:</span>
            <span id="total-carrinho">R$ 0,00</span>
        </div>

        <input type="text"
               id="cliente-nome"
               placeholder="Seu nome"
               class="w-full p-2 border rounded">

        <input type="text"
               id="cliente-endereco"
               placeholder="Seu endereço"
               class="w-full p-2 border rounded">

        <button onclick="enviarWhatsApp()"
                class="w-full bg-green-500 text-white py-3 rounded-lg font-bold hover:bg-green-600 transition">

            <i class="fab fa-whatsapp"></i>
            Enviar Pedido
        </button>

    </div>

</div>

<!-- ZOOM -->
<div id="zoom-modal"
     class="zoom-modal fixed inset-0 bg-black bg-opacity-90 z-50 items-center justify-center p-4"
     onclick="fecharZoom()">

    <span class="absolute top-4 right-4 text-white text-4xl cursor-pointer font-bold">
        ×
    </span>

    <img id="img-zoom"
         class="max-w-full max-h-full rounded-lg shadow-2xl"
         src=""
         alt="Zoom">

</div>

<script>

const SUPABASE_URL =
"https://yawousokoaqeyvktjosj.supabase.co";

const SUPABASE_KEY =
"sb_publishable__TXuxjZ8PObBZxsM-PjF1Q_fAvPsDa3";

const WHATSAPP_NUMERO =
"5531999999999";

const _supabase =
supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let listaProdutos = [];
let carrinhoCompras = [];
let categoriaAtual = 'todos';

/* =========================================
   INICIAR
========================================= */

document.addEventListener("DOMContentLoaded",()=>{

    limparSessaoCorrompida();

    carregarProdutosDoBanco();

    verificarEstadoLogin();
});

/* =========================================
   LIMPAR TOKEN CORROMPIDO
========================================= */

async function limparSessaoCorrompida(){

    try{

        const { error } =
        await _supabase.auth.getSession();

        if(error){

            await _supabase.auth.signOut();

            localStorage.clear();
            sessionStorage.clear();
        }

    }catch(e){

        console.log(e);
    }
}

/* =========================================
   ABAS
========================================= */

function mudarAba(nome){

    document.querySelectorAll('.tab-content')
        .forEach(el=>el.classList.remove('active'));

    document.getElementById('aba-'+nome)
        .classList.add('active');
}

/* =========================================
   FILTRO
========================================= */

function filtrarCategoria(categoria,btn){

    categoriaAtual = categoria;

    document.querySelectorAll('.categoria-btn')
        .forEach(b=>b.classList.remove('categoria-ativa'));

    btn.classList.add('categoria-ativa');

    renderizarProdutosNoHtml();
}

/* =========================================
   CARREGAR PRODUTOS
========================================= */

async function carregarProdutosDoBanco(){

    try{

        const { data,error } =
        await _supabase
            .from('produtos')
            .select('*')
            .order('criado_em',{ascending:false});

        if(error) throw error;

        listaProdutos = data || [];

        renderizarProdutosNoHtml();

    }catch(err){

        console.log(err);

        document.getElementById('grid-produtos').innerHTML =
        `
        <div class="col-span-full text-center py-12 text-red-500">
            Erro ao carregar produtos
        </div>
        `;
    }
}

/* =========================================
   RENDER
========================================= */

function renderizarProdutosNoHtml(){

    const grid =
    document.getElementById('grid-produtos');

    let produtos = listaProdutos;

    if(categoriaAtual !== 'todos'){

        produtos =
        listaProdutos.filter(p =>
            p.categoria === categoriaAtual
        );
    }

    if(produtos.length === 0){

        grid.innerHTML =
        `
        <div class="col-span-full text-center py-12 text-gray-400">
            Nenhum produto encontrado
        </div>
        `;

        return;
    }

    grid.innerHTML = produtos.map(prod=>`

        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl border border-gray-100 transition flex flex-col">

            <div class="overflow-hidden bg-gray-50 h-48 cursor-pointer relative group"
                 onclick="abrirZoom('${prod.imagem_url}')">

                <img src="${prod.imagem_url || 'https://via.placeholder.com/300'}"
                     class="w-full h-full object-cover group-hover:scale-105 transition duration-300">

                <div class="absolute top-2 left-2 bg-amber-500 text-white text-xs px-2 py-1 rounded-full font-bold shadow">
                    ${prod.categoria || 'produto'}
                </div>
            </div>

            <div class="p-4 flex-grow flex flex-col justify-between">

                <div>
                    <h3 class="font-bold text-gray-800 text-base mb-1">
                        ${prod.nome}
                    </h3>

                    <p class="text-gray-500 text-xs mb-3 line-clamp-2">
                        ${prod.descricao || ''}
                    </p>
                </div>

                <div class="flex justify-between items-center mt-auto pt-2 border-t border-gray-50">

                    <span class="text-amber-600 font-extrabold text-lg">
                        R$ ${parseFloat(prod.preco).toFixed(2).replace('.',',')}
                    </span>

                    <button onclick="adicionarNoCarrinho('${prod.id}')"
                            class="bg-amber-50 text-amber-600 border border-amber-200 hover:bg-amber-500 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition">

                        <i class="fas fa-cart-plus"></i>
                        Adicionar
                    </button>

                </div>
            </div>

        </div>

    `).join('');
}

/* =========================================
   ZOOM
========================================= */

function abrirZoom(url){

    if(!url) return;

    document.getElementById('img-zoom').src = url;

    document.getElementById('zoom-modal')
        .classList.add('active');
}

function fecharZoom(){

    document.getElementById('zoom-modal')
        .classList.remove('active');
}

/* =========================================
   CARRINHO
========================================= */

function toggleCarrinho(){

    document.getElementById('sidebar-carrinho')
        .classList.toggle('translate-x-full');
}

function adicionarNoCarrinho(id){

    const produto =
    listaProdutos.find(p=>p.id===id);

    const existe =
    carrinhoCompras.find(i=>i.id===id);

    if(existe){

        existe.quantidade++;

    }else{

        carrinhoCompras.push({
            ...produto,
            quantidade:1
        });
    }

    atualizarCarrinho();

    document.getElementById('sidebar-carrinho')
        .classList.remove('translate-x-full');
}

function modificarQtdItem(id,op){

    const item =
    carrinhoCompras.find(i=>i.id===id);

    if(!item) return;

    item.quantidade += op;

    if(item.quantidade <= 0){

        carrinhoCompras =
        carrinhoCompras.filter(i=>i.id!==id);
    }

    atualizarCarrinho();
}

function atualizarCarrinho(){

    const container =
    document.getElementById('itens-carrinho');

    const contador =
    document.getElementById('cart-count');

    const totalTexto =
    document.getElementById('total-carrinho');

    if(carrinhoCompras.length===0){

        container.innerHTML =
        `<p class="text-center text-gray-400 my-8">
            Seu carrinho está vazio.
        </p>`;

        contador.classList.add('hidden');

        totalTexto.textContent = 'R$ 0,00';

        return;
    }

    let totalItens = 0;
    let total = 0;

    container.innerHTML = carrinhoCompras.map(item=>{

        totalItens += item.quantidade;

        total += item.preco * item.quantidade;

        return `
        <div class="flex items-center justify-between border-b pb-3">

            <div>
                <h4 class="font-bold text-sm">
                    ${item.nome}
                </h4>

                <p class="text-xs text-amber-600">
                    R$ ${parseFloat(item.preco).toFixed(2).replace('.',',')}
                </p>
            </div>

            <div class="flex items-center gap-2">

                <button onclick="modificarQtdItem('${item.id}',-1)">
                    -
                </button>

                <span>${item.quantidade}</span>

                <button onclick="modificarQtdItem('${item.id}',1)">
                    +
                </button>

            </div>

        </div>
        `;

    }).join('');

    contador.textContent = totalItens;
    contador.classList.remove('hidden');

    totalTexto.textContent =
    `R$ ${total.toFixed(2).replace('.',',')}`;
}

/* =========================================
   WHATSAPP
========================================= */

function enviarWhatsApp(){

    if(carrinhoCompras.length===0){

        alert('Carrinho vazio');
        return;
    }

    const nome =
    document.getElementById('cliente-nome')
        .value.trim();

    const endereco =
    document.getElementById('cliente-endereco')
        .value.trim();

    if(!nome || !endereco){

        alert('Preencha nome e endereço');
        return;
    }

    let msg =
    `🍔 *NOVO PEDIDO* 🍔\n\n`;

    msg += `Cliente: ${nome}\n`;
    msg += `Endereço: ${endereco}\n\n`;

    let total = 0;

    carrinhoCompras.forEach(item=>{

        const subtotal =
        item.preco * item.quantidade;

        total += subtotal;

        msg +=
        `${item.quantidade}x ${item.nome}\n`;

        msg +=
        `R$ ${subtotal.toFixed(2)}\n\n`;
    });

    msg += `TOTAL: R$ ${total.toFixed(2)}`;

    window.open(
        `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMERO}&text=${encodeURIComponent(msg)}`,
        '_blank'
    );
}

/* =========================================
   LOGIN
========================================= */

function verificarEstadoLogin(){

    _supabase.auth.onAuthStateChange(
        (event,session)=>{

        if(session){

            document.getElementById('secao-login')
                .classList.add('hidden');

            document.getElementById('secao-admin-painel')
                .classList.remove('hidden');

        }else{

            document.getElementById('secao-login')
                .classList.remove('hidden');

            document.getElementById('secao-admin-painel')
                .classList.add('hidden');
        }
    });
}

async function fazerLogin(){

    const email =
    document.getElementById('login-email')
        .value.trim();

    const senha =
    document.getElementById('login-senha')
        .value.trim();

    if(!email || !senha){

        alert('Preencha todos os campos');
        return;
    }

    const { error } =
    await _supabase.auth.signInWithPassword({
        email,
        password:senha
    });

    if(error){

        alert(error.message);
    }
}

async function fazerLogout(){

    await _supabase.auth.signOut();
}

/* =========================================
   SALVAR PRODUTO
========================================= */

async function salvarProduto(e){

    e.preventDefault();

    const btn =
    document.getElementById('btn-cadastrar');

    const nome =
    document.getElementById('prod-nome')
        .value.trim();

    const descricao =
    document.getElementById('prod-descricao')
        .value.trim();

    const categoria =
    document.getElementById('prod-categoria')
        .value;

    const preco =
    parseFloat(
        document.getElementById('prod-preco')
        .value
    );

    const arquivo =
    document.getElementById('prod-imagem')
        .files[0];

    if(!arquivo){

        alert('Selecione imagem');
        return;
    }

    btn.disabled = true;

    btn.innerHTML =
    `<i class="fas fa-spinner fa-spin"></i> Enviando`;

    try{

        const ext =
        arquivo.name.split('.').pop();

        const nomeArquivo =
        `${Date.now()}_produto.${ext}`;

        const { error:upError } =
        await _supabase.storage
            .from('imagens-produtos')
            .upload(nomeArquivo,arquivo);

        if(upError) throw upError;

        const { data:urlData } =
        _supabase.storage
            .from('imagens-produtos')
            .getPublicUrl(nomeArquivo);

        const imagem_url =
        urlData.publicUrl;

        const { error:dbError } =
        await _supabase
            .from('produtos')
            .insert([
                {
                    nome,
                    descricao,
                    categoria,
                    preco,
                    imagem_url
                }
            ]);

        if(dbError) throw dbError;

        alert('Produto cadastrado');

        document.getElementById('form-produto')
            .reset();

        carregarProdutosDoBanco();

        mudarAba('catalogo');

    }catch(err){

        alert(err.message);

    }finally{

        btn.disabled = false;

        btn.innerHTML =
        `<i class="fas fa-cloud-upload-alt"></i>
         Publicar no Catálogo`;
    }
}

</script>

</body>
</html>
