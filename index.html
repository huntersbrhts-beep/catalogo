<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Du Lanche - Delivery Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .categoria-card:hover { transform: translateY(-5px); }
        .carrinho-sidebar { transition: transform 0.3s ease; }
    </style>
</head>
<body class="text-white min-h-screen">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-slate-950/90 backdrop-blur-xl border-b border-white/10 p-5 flex justify-between items-center">
        <h1 class="text-2xl font-black text-amber-400 cursor-pointer" onclick="mudarAba('catalogo')">DU LANCHE</h1>
        <div class="flex gap-4">
            <button onclick="mudarAba('admin')" class="text-xl hover:text-amber-400"><i class="fas fa-cog"></i></button>
            <button onclick="toggleCarrinho()" class="relative text-xl hover:text-amber-400">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-badge" class="absolute -top-2 -right-2 bg-red-500 text-[10px] w-4 h-4 rounded-full hidden">0</span>
            </button>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <!-- CATALOGO -->
        <section id="aba-catalogo" class="tab-content active">
            <h3 class="text-2xl font-black mb-5">Categorias</h3>
            <div id="grid-categorias" class="grid grid-cols-2 md:grid-cols-4 gap-5 mb-10"></div>
            <h3 class="text-2xl font-black mb-5">Produtos</h3>
            <div id="grid-produtos" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <!-- ADMIN -->
        <section id="aba-admin" class="tab-content">
            <div class="bg-slate-900 border border-white/10 rounded-3xl p-6 max-w-2xl mx-auto">
                <h2 class="text-xl font-black mb-4">Cadastrar Produto</h2>
                <input type="file" id="prod-img" class="w-full bg-slate-800 p-2 mb-3 rounded">
                <input type="text" id="prod-nome" placeholder="Nome" class="w-full bg-slate-800 p-3 mb-3 rounded outline-none">
                <input type="text" id="prod-categoria" placeholder="Categoria" class="w-full bg-slate-800 p-3 mb-3 rounded outline-none">
                <input type="number" id="prod-preco" placeholder="Preço" class="w-full bg-slate-800 p-3 mb-3 rounded outline-none">
                <button onclick="adicionarProduto()" class="w-full bg-amber-500 text-black py-3 rounded font-black">CADASTRAR</button>
            </div>
        </section>
    </main>

    <!-- CARRINHO -->
    <div id="sidebar-carrinho" class="carrinho-sidebar fixed top-0 right-0 h-full w-80 bg-slate-950 border-l border-white/10 p-5 translate-x-full z-50">
        <h2 class="font-black mb-4">Seu Pedido</h2>
        <div id="itens-carrinho" class="mb-4"></div>
        <button onclick="finalizarPedido()" class="w-full bg-emerald-500 py-3 rounded font-black">FINALIZAR (WhatsApp)</button>
    </div>

    <script>
        const _supabase = supabase.createClient("https://yawousokoaqeyvktjosj.supabase.co", "sb_publishable__TXuxjZ8PObBZxsM-PjF1Q_fAvPsDa3");
        let listaProdutos = [], carrinho = [];

        window.onload = carregarProdutos;

        async function carregarProdutos() {
            const { data } = await _supabase.from('produtos').select('*');
            listaProdutos = data || [];
            renderizarCategorias();
            renderizarProdutos(listaProdutos);
        }

        function renderizarCategorias() {
            const cats = [...new Set(listaProdutos.map(p => p.categoria || 'Outros'))];
            document.getElementById('grid-categorias').innerHTML = cats.map(cat => `
                <div class="categoria-card bg-slate-900 border border-white/10 rounded-3xl p-6">
                    <div class="cursor-pointer mb-4" onclick="filtrarCategoria('${cat}')">
                        <div class="text-3xl">🔥</div>
                        <h2 class="font-black mt-2">${cat}</h2>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editarCategoria('${cat}')" class="flex-1 bg-slate-800 p-1 text-[10px]">EDITAR</button>
                        <button onclick="removerCategoria('${cat}')" class="flex-1 bg-red-900 p-1 text-[10px]">EXCLUIR</button>
                    </div>
                </div>`).join('');
        }

        function renderizarProdutos(prods) {
            document.getElementById('grid-produtos').innerHTML = prods.map(p => `
                <div class="bg-slate-900 border border-white/10 rounded-2xl p-4">
                    <img src="${p.imagem_url}" class="h-32 w-full object-cover rounded-xl mb-2">
                    <h2 class="font-black">${p.nome}</h2>
                    <p class="text-amber-400 font-bold mb-2">R$ ${parseFloat(p.preco).toFixed(2)}</p>
                    <button onclick="adicionarCarrinho('${p.id}')" class="w-full bg-amber-500 text-black py-1 rounded font-bold">+</button>
                </div>`).join('');
        }

        function adicionarCarrinho(id) {
            const p = listaProdutos.find(x => x.id === id);
            carrinho.push(p);
            document.getElementById('cart-badge').innerText = carrinho.length;
            document.getElementById('cart-badge').classList.remove('hidden');
        }

        function toggleCarrinho() { document.getElementById('sidebar-carrinho').classList.toggle('translate-x-full'); }
        function mudarAba(aba) { document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active')); document.getElementById('aba-' + aba).classList.add('active'); }
        async function removerCategoria(cat) { await _supabase.from('produtos').delete().eq('categoria', cat); carregarProdutos(); }
        async function adicionarProduto() { /* Lógica de upload aqui */ alert('Cadastrado!'); carregarProdutos(); }
    </script>
</body>
</html>
