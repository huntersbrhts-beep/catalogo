<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Du Lanche - Gestão Completa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <header class="p-4 flex justify-between items-center bg-slate-900 border-b border-white/10">
        <h1 class="font-black text-amber-500 cursor-pointer" onclick="mudarAba('catalogo')">Du LANCHE</h1>
        <button onclick="mudarAba('admin')" class="text-xl"><i class="fas fa-cog"></i></button>
    </header>

    <main class="container mx-auto p-4">
        <div id="aba-catalogo" class="tab-content active">
            <div class="flex overflow-x-auto gap-2 py-4 mb-4">
                <button onclick="filtrar('Todos')" class="px-4 py-2 bg-amber-500 rounded-full font-bold text-xs">Todos</button>
                <button onclick="filtrar('Hamburguer')" class="px-4 py-2 bg-slate-800 rounded-full font-bold text-xs">Hamburguer</button>
                <button onclick="filtrar('Batata')" class="px-4 py-2 bg-slate-800 rounded-full font-bold text-xs">Batata</button>
                <button onclick="filtrar('Bebidas')" class="px-4 py-2 bg-slate-800 rounded-full font-bold text-xs">Bebidas</button>
            </div>
            <div id="grid-produtos" class="grid grid-cols-2 gap-4"></div>
        </div>

        <div id="aba-admin" class="tab-content hidden max-w-lg mx-auto bg-slate-900 p-6 rounded-3xl">
            <h2 class="font-black text-lg mb-4 text-amber-500">Painel de Gestão</h2>
            <div id="secao-login" class="space-y-3">
                <input type="email" id="email" placeholder="Email" class="w-full p-2 rounded text-black">
                <input type="password" id="senha" placeholder="Senha" class="w-full p-2 rounded text-black">
                <button onclick="logar()" class="w-full bg-blue-600 p-2 rounded font-bold">Entrar</button>
            </div>
            <div id="secao-painel" class="hidden space-y-3">
                <div id="lista-admin" class="max-h-60 overflow-y-auto space-y-2"></div>
                <button onclick="fazerLogout()" class="w-full text-red-400 text-xs underline">Sair</button>
            </div>
        </div>
    </main>

    <script>
        const _s = supabase.createClient("https://yawousokoaqeyvktjosj.supabase.co", "sb_publishable__TXuxjZ8PObBZxsM-PjF1Q_fAvPsDa3");
        let lista = [];
        const cats = ['Hamburguer', 'Batata', 'Caldos', 'Porcoes', 'Bebidas', 'Cachorro Quente', 'Combos'];

        async function carregar() {
            const { data } = await _s.from('produtos').select('*');
            lista = data || [];
            filtrar('Todos');
        }

        function filtrar(c) {
            const grid = document.getElementById('grid-produtos');
            const filtrados = c === 'Todos' ? lista : lista.filter(p => p.categoria === c);
            grid.innerHTML = filtrados.map(p => `
                <div class="bg-slate-800 p-3 rounded-xl border border-white/10">
                    <img src="${p.imagem_url}" class="h-24 w-full object-cover rounded-lg">
                    <p class="font-bold text-xs">${p.nome}</p>
                </div>
            `).join('');
        }

        // FUNÇÃO DE REALOCAÇÃO E DELEÇÃO NO ADMIN
        function carregarPainel() {
            const cont = document.getElementById('lista-admin');
            cont.innerHTML = lista.map(p => `
                <div class="flex justify-between items-center bg-slate-800 p-2 rounded text-[10px]">
                    <span class="w-1/3 truncate">${p.nome}</span>
                    <select onchange="realocar('${p.id}', this.value)" class="bg-black p-1 rounded">
                        ${cats.map(c => `<option value="${c}" ${p.categoria === c ? 'selected' : ''}>${c}</option>`).join('')}
                    </select>
                    <button onclick="apagar('${p.id}')" class="text-red-500"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        async function realocar(id, cat) {
            await _s.from('produtos').update({ categoria: cat }).eq('id', id);
            await carregar();
            carregarPainel();
        }

        async function apagar(id) {
            if(!confirm("Apagar produto?")) return;
            await _s.from('produtos').delete().eq('id', id);
            await carregar();
            carregarPainel();
        }

        async function logar() {
            const { error } = await _s.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('senha').value });
            if (!error) {
                document.getElementById('secao-login').classList.add('hidden');
                document.getElementById('secao-painel').classList.remove('hidden');
                carregarPainel();
            } else alert("Erro no login");
        }

        function mudarAba(aba) { document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active', 'hidden')); document.getElementById('aba-' + aba).classList.add('active'); if(aba=='catalogo') document.getElementById('aba-admin').classList.add('hidden'); }
        function fazerLogout() { _s.auth.signOut(); location.reload(); }
        window.onload = carregar;
    </script>
</body>
</html>
