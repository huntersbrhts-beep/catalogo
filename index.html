<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Du Lanche - Delivery Premium</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            scroll-behavior: smooth;
        }

        body {
            background: #020617;
            overflow-x: hidden;
        }

        .bg-fundo {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: .12;
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                linear-gradient(to bottom,
                    rgba(2, 6, 23, 0.96),
                    rgba(15, 23, 42, 0.98));
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .zoom-modal {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: none;
            background: rgba(0, 0, 0, .95);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .zoom-modal.active {
            display: flex;
        }

        .categoria-card {
            position: relative;
            overflow: hidden;
            transition: .4s;
        }

        .categoria-card:hover {
            transform: translateY(-6px);
        }

        .categoria-card img {
            transition: transform .7s ease;
        }

        .categoria-card:hover img {
            transform: scale(1.08);
        }

        .produto-card {
            transition: .3s;
        }

        .produto-card:hover {
            transform: translateY(-5px);
        }

        #itens-carrinho::-webkit-scrollbar {
            width: 4px;
        }

        #itens-carrinho::-webkit-scrollbar-thumb {
            background: #f59e0b;
            border-radius: 10px;
        }

        .loading {
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {

            0% {
                opacity: .5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: .5;
            }

        }
    </style>
</head>

<body class="text-white min-h-screen flex flex-col">

    <!-- FUNDO -->

    <div id="bg-dinamico" class="bg-fundo"></div>
    <div class="overlay"></div>

    <!-- HEADER -->

    <header
        class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-white/5">

        <div
            class="container mx-auto px-5 py-4 flex items-center justify-between">

            <div
                onclick="voltarHome()"
                class="cursor-pointer">

                <h1
                    class="text-2xl md:text-3xl font-black text-amber-400">

                    DU LANCHE

                </h1>

            </div>

            <div
                class="flex items-center gap-5">

                <button
                    onclick="mudarAba('admin')"
                    class="hover:text-amber-400 transition text-xl">

                    <i class="fas fa-cog"></i>

                </button>

                <button
                    onclick="toggleCarrinho()"
                    class="relative hover:text-amber-400 transition text-2xl">

                    <i class="fas fa-shopping-bag"></i>

                    <span
                        id="cart-badge"
                        class="hidden absolute -top-2 -right-2 bg-red-500 w-5 h-5 rounded-full text-[10px] font-bold flex items-center justify-center">

                        0

                    </span>

                </button>

            </div>

        </div>

    </header>

    <!-- MAIN -->

    <main
        class="container mx-auto px-4 py-6 flex-grow">

        <!-- HOME -->

        <section
            id="aba-catalogo"
            class="tab-content active">

            <!-- HERO -->

            <div
                class="relative overflow-hidden rounded-[40px] bg-gradient-to-r from-amber-500 to-orange-600 p-8 md:p-14 mb-12 shadow-2xl">

                <div class="relative z-10">

                    <p
                        class="uppercase tracking-[4px] text-sm font-bold text-white/80 mb-4">

                        DELIVERY PREMIUM

                    </p>

                    <h2
                        class="text-4xl md:text-6xl font-black leading-tight mb-5">

                        Os melhores <br>
                        lanches da cidade

                    </h2>

                    <p
                        class="max-w-xl text-white/90 text-sm md:text-base mb-8">

                        Escolha sua categoria favorita e peça agora mesmo.

                    </p>

                    <button
                        onclick="scrollCategorias()"
                        class="bg-black hover:bg-slate-900 transition text-white px-8 py-4 rounded-2xl font-black shadow-xl">

                        VER CARDÁPIO

                    </button>

                </div>

            </div>

            <!-- CATEGORIAS -->

            <section
                id="categorias"
                class="mb-14">

                <div
                    class="flex items-center justify-between mb-6">

                    <h2
                        class="text-3xl font-black">

                        Categorias

                    </h2>

                    <button
                        onclick="mostrarTodosProdutos()"
                        class="text-amber-400 hover:text-amber-300">

                        Ver todos

                    </button>

                </div>

                <div
                    id="grid-categorias"
                    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

                </div>

            </section>

            <!-- PRODUTOS -->

            <section>

                <div
                    class="flex items-center justify-between mb-6">

                    <h2
                        id="titulo-produtos"
                        class="text-3xl font-black">

                        Todos os Produtos

                    </h2>

                </div>

                <div
                    id="grid-produtos"
                    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

                </div>

            </section>

        </section>

        <!-- ADMIN -->

        <section
            id="aba-admin"
            class="tab-content">

            <!-- LOGIN -->

            <div
                id="secao-login-admin"
                class="max-w-md mx-auto">

                <div
                    class="bg-slate-900 border border-white/10 rounded-3xl p-8 shadow-2xl">

                    <h2
                        class="text-3xl font-black mb-2">

                        Login Admin

                    </h2>

                    <p
                        class="text-white/50 mb-6">

                        Entre para acessar o painel administrativo.

                    </p>

                    <div class="space-y-4">

                        <input
                            type="email"
                            id="login-email"
                            placeholder="Seu e-mail"
                            class="w-full bg-slate-800 rounded-2xl p-4 outline-none border border-white/10">

                        <input
                            type="password"
                            id="login-senha"
                            placeholder="Sua senha"
                            class="w-full bg-slate-800 rounded-2xl p-4 outline-none border border-white/10">

                        <button
                            onclick="fazerLogin()"
                            class="w-full bg-amber-500 hover:bg-amber-400 transition text-black py-4 rounded-2xl font-black">

                            ENTRAR

                        </button>

                    </div>

                </div>

            </div>

            <!-- PAINEL -->

            <div
                id="painel-admin-conteudo"
                class="hidden">

                <div
                    class="grid md:grid-cols-[260px_1fr] gap-6">

                    <!-- MENU -->

                    <div
                        class="bg-slate-900 border border-white/10 rounded-3xl p-5 h-fit sticky top-24">

                        <div
                            class="flex items-center justify-between mb-6">

                            <h2
                                class="text-2xl font-black">

                                Painel

                            </h2>

                            <button
                                onclick="fazerLogout()"
                                class="text-red-400 hover:text-red-300">

                                <i class="fas fa-sign-out-alt"></i>

                            </button>

                        </div>

                        <div class="space-y-3">

                            <button
                                class="w-full bg-amber-500 text-black py-3 rounded-xl font-black">

                                Produtos

                            </button>

                        </div>

                    </div>

                    <!-- CONTEUDO -->

                    <div class="space-y-6">

                        <!-- FORM -->

                        <div
                            class="bg-slate-900 border border-white/10 rounded-3xl p-6">

                            <h2
                                class="text-3xl font-black mb-6">

                                Adicionar Produto

                            </h2>

                            <div
                                class="grid md:grid-cols-2 gap-4">

                                <input
                                    type="file"
                                    id="prod-img"
                                    class="bg-slate-800 rounded-xl p-4 text-sm">

                                <input
                                    type="text"
                                    id="prod-nome"
                                    placeholder="Nome do produto"
                                    class="bg-slate-800 rounded-xl p-4 outline-none">

                                <input
                                    type="text"
                                    id="prod-categoria"
                                    placeholder="Categoria"
                                    class="bg-slate-800 rounded-xl p-4 outline-none">

                                <input
                                    type="number"
                                    id="prod-preco"
                                    placeholder="Preço"
                                    class="bg-slate-800 rounded-xl p-4 outline-none">

                            </div>

                            <textarea
                                id="prod-desc"
                                placeholder="Descrição"
                                class="w-full h-32 bg-slate-800 rounded-xl p-4 outline-none mt-4"></textarea>

                            <button
                                onclick="adicionarProduto()"
                                class="mt-5 bg-amber-500 hover:bg-amber-400 transition text-black px-8 py-4 rounded-2xl font-black">

                                CADASTRAR PRODUTO

                            </button>

                        </div>

                        <!-- LISTA -->

                        <div
                            class="bg-slate-900 border border-white/10 rounded-3xl p-6">

                            <div
                                class="flex items-center justify-between mb-6">

                                <h2
                                    class="text-2xl font-black">

                                    Produtos Cadastrados

                                </h2>

                                <button
                                    onclick="carregarProdutosAdmin()"
                                    class="bg-slate-800 hover:bg-slate-700 transition px-4 py-2 rounded-xl">

                                    Atualizar

                                </button>

                            </div>

                            <div
                                id="lista-admin-produtos"
                                class="space-y-4">

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <!-- CARRINHO -->

    <div
        id="sidebar-carrinho"
        class="fixed top-0 right-0 h-full w-full md:w-[430px] bg-slate-950 z-50 translate-x-full transition-transform duration-300 border-l border-white/10 flex flex-col">

        <div
            class="p-5 border-b border-white/10 flex items-center justify-between">

            <h2
                class="text-2xl font-black">

                Seu Pedido

            </h2>

            <button
                onclick="toggleCarrinho()"
                class="w-10 h-10 rounded-full bg-slate-800 hover:bg-slate-700">

                <i class="fas fa-times"></i>

            </button>

        </div>

        <div
            id="itens-carrinho"
            class="flex-grow overflow-y-auto p-5 space-y-4">

        </div>

        <div
            class="p-5 border-t border-white/10">

            <div class="space-y-3 mb-5">

                <input
                    type="text"
                    id="cliente-nome"
                    placeholder="Seu nome"
                    class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 outline-none">

                <input
                    type="text"
                    id="cliente-endereco"
                    placeholder="Endereço"
                    class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 outline-none">

            </div>

            <div
                class="flex items-center justify-between mb-5">

                <span
                    class="text-white/60">

                    Total

                </span>

                <span
                    id="total-carrinho"
                    class="text-3xl font-black text-amber-400">

                    R$ 0,00

                </span>

            </div>

            <button
                onclick="finalizarPedido()"
                class="w-full bg-emerald-500 hover:bg-emerald-400 transition text-black py-4 rounded-2xl font-black shadow-xl">

                FINALIZAR PEDIDO

            </button>

        </div>

    </div>

    <!-- ZOOM -->

    <div
        id="zoom-modal"
        class="zoom-modal"
        onclick="fecharZoom()">

        <img
            id="img-zoom"
            class="max-w-[90%] max-h-[90vh] rounded-3xl shadow-2xl">

    </div>

    <!-- SCRIPT -->

    <script>

        const _supabase = supabase.createClient(
            "https://yawousokoaqeyvktjosj.supabase.co",
            "sb_publishable__TXuxjZ8PObBZxsM-PjF1Q_fAvPsDa3"
        );

        let listaProdutos = [];
        let carrinho = [];

        // =========================================
        // REALTIME
        // =========================================

        _supabase
            .channel('public:produtos')
            .on(
                'postgres_changes',
                {
                    event: '*',
                    schema: 'public',
                    table: 'produtos'
                },
                () => {

                    carregarProdutos();
                    carregarProdutosAdmin();

                }
            )
            .subscribe();

        // =========================================
        // START
        // =========================================

        window.onload = async () => {

            carregarProdutos();
            carregarFundo();
            verificarSessao();

        };

        // =========================================
        // AUTH
        // =========================================

        async function verificarSessao() {

            const {
                data: { session }
            } = await _supabase.auth.getSession();

            if (session) {

                mostrarPainelAdmin();

            }

        }

        async function fazerLogin() {

            const email =
                document.getElementById('login-email').value;

            const senha =
                document.getElementById('login-senha').value;

            const { error } =
                await _supabase.auth.signInWithPassword({

                    email,
                    password: senha

                });

            if (error) {

                alert('Erro no login.');
                return;

            }

            mostrarPainelAdmin();

        }

        async function fazerLogout() {

            await _supabase.auth.signOut();

            location.reload();

        }

        function mostrarPainelAdmin() {

            document
                .getElementById('secao-login-admin')
                .classList.add('hidden');

            document
                .getElementById('painel-admin-conteudo')
                .classList.remove('hidden');

            carregarProdutosAdmin();

        }

        // =========================================
        // UI
        // =========================================

        function mudarAba(aba) {

            document
                .querySelectorAll('.tab-content')
                .forEach(el =>
                    el.classList.remove('active')
                );

            document
                .getElementById('aba-' + aba)
                .classList.add('active');

        }

        function voltarHome() {

            mudarAba('catalogo');

        }

        function scrollCategorias() {

            document
                .getElementById('categorias')
                .scrollIntoView({
                    behavior: 'smooth'
                });

        }

        function toggleCarrinho() {

            document
                .getElementById('sidebar-carrinho')
                .classList.toggle('translate-x-full');

        }

        function abrirZoom(url) {

            document
                .getElementById('img-zoom')
                .src = url;

            document
                .getElementById('zoom-modal')
                .classList.add('active');

        }

        function fecharZoom() {

            document
                .getElementById('zoom-modal')
                .classList.remove('active');

        }

        // =========================================
        // PRODUTOS
        // =========================================

        async function carregarProdutos() {

            const { data, error } =
                await _supabase
                    .from('produtos')
                    .select('*')
                    .order('nome');

            if (error) {

                console.log(error);
                return;

            }

            listaProdutos = data || [];

            renderizarCategorias();
            mostrarTodosProdutos();

        }

        function renderizarCategorias() {

            const categorias = [...new Set(
                listaProdutos.map(
                    p => p.categoria || 'Outros'
                )
            )];

            const imagensCategorias = {

                hamburguer:
                    'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=1200&auto=format&fit=crop',

                bebidas:
                    'https://images.unsplash.com/photo-1544145945-f90425340c7e?q=80&w=1200&auto=format&fit=crop',

                porcoes:
                    'https://images.unsplash.com/photo-1576107232684-1279f390859f?q=80&w=1200&auto=format&fit=crop',

                sobremesas:
                    'https://images.unsplash.com/photo-1551024601-bec78aea704b?q=80&w=1200&auto=format&fit=crop',

                pizza:
                    'https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1200&auto=format&fit=crop',

                outros:
                    'https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1200&auto=format&fit=crop'
            };

            const icones = {

                hamburguer: '🍔',
                bebidas: '🥤',
                porcoes: '🍟',
                sobremesas: '🍰',
                pizza: '🍕',
                outros: '🔥'

            };

            document
                .getElementById('grid-categorias')
                .innerHTML = categorias.map(cat => {

                    const nomeCategoria =
                        cat.toLowerCase();

                    const imagem =
                        imagensCategorias[nomeCategoria]
                        || imagensCategorias.outros;

                    const icon =
                        icones[nomeCategoria]
                        || '🔥';

                    const quantidade =
                        listaProdutos.filter(
                            p => (
                                p.categoria || 'Outros'
                            ) === cat
                        ).length;

                    return `

                    <div
                        onclick="filtrarCategoria('${cat}')"
                        class="categoria-card group relative rounded-[35px] overflow-hidden h-[240px] cursor-pointer shadow-2xl">

                        <img
                            src="${imagem}"
                            class="absolute inset-0 w-full h-full object-cover">

                        <div
                            class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent">
                        </div>

                        <div
                            class="relative z-10 h-full flex flex-col justify-end p-6">

                            <div
                                class="w-16 h-16 rounded-2xl bg-white/10 backdrop-blur-md border border-white/10 flex items-center justify-center text-3xl mb-5">

                                ${icon}

                            </div>

                            <h2
                                class="text-3xl font-black capitalize mb-1">

                                ${cat}

                            </h2>

                            <div
                                class="flex items-center justify-between">

                                <p
                                    class="text-white/70 text-sm">

                                    ${quantidade} produtos

                                </p>

                                <div
                                    class="w-10 h-10 rounded-full bg-amber-500 text-black flex items-center justify-center font-black">

                                    →

                                </div>

                            </div>

                        </div>

                    </div>

                    `;

                }).join('');

        }

        function filtrarCategoria(categoria) {

            document
                .getElementById('titulo-produtos')
                .innerText = categoria;

            const produtos =
                listaProdutos.filter(
                    p => (
                        p.categoria || 'Outros'
                    ) === categoria
                );

            renderizarProdutos(produtos);

        }

        function mostrarTodosProdutos() {

            document
                .getElementById('titulo-produtos')
                .innerText = 'Todos os Produtos';

            renderizarProdutos(listaProdutos);

        }

        function renderizarProdutos(produtos) {

            document
                .getElementById('grid-produtos')
                .innerHTML = produtos.map(p => `

                <div
                    class="produto-card bg-slate-900 border border-white/10 rounded-[35px] overflow-hidden shadow-xl flex flex-col">

                    <div class="relative">

                        <img
                            src="${p.imagem_url}"
                            onclick="abrirZoom('${p.imagem_url}')"
                            class="w-full h-64 object-cover cursor-pointer">

                        <div
                            class="absolute top-4 left-4 bg-amber-500 text-black px-3 py-1 rounded-full text-xs font-black uppercase">

                            ${p.categoria || 'Produto'}

                        </div>

                    </div>

                    <div class="p-5 flex flex-col flex-grow">

                        <h2
                            class="text-2xl font-black mb-2">

                            ${p.nome}

                        </h2>

                        <p
                            class="text-white/60 text-sm leading-relaxed mb-6 flex-grow">

                            ${p.descricao || ''}

                        </p>

                        <div
                            class="flex items-center justify-between">

                            <span
                                class="text-3xl font-black text-amber-400">

                                R$ ${Number(p.preco).toFixed(2)}

                            </span>

                            <button
                                onclick="adicionarCarrinho('${p.id}')"
                                class="bg-amber-500 hover:bg-amber-400 transition text-black px-5 py-3 rounded-2xl font-black">

                                +

                            </button>

                        </div>

                    </div>

                </div>

                `).join('');

        }

        // =========================================
        // ADMIN CRUD
        // =========================================

        async function adicionarProduto() {

            const file =
                document.getElementById('prod-img').files[0];

            const nome =
                document.getElementById('prod-nome').value;

            const descricao =
                document.getElementById('prod-desc').value;

            const preco =
                document.getElementById('prod-preco').value;

            const categoria =
                document.getElementById('prod-categoria').value;

            if (!file || !nome || !preco) {

                alert('Preencha todos os campos.');
                return;

            }

            const fileName =
                `produto_${Date.now()}`;

            const { error: uploadError } =
                await _supabase.storage
                    .from('imagens-produtos')
                    .upload(fileName, file);

            if (uploadError) {

                alert('Erro upload imagem.');
                return;

            }

            const {
                data: { publicUrl }
            } =
                _supabase.storage
                    .from('imagens-produtos')
                    .getPublicUrl(fileName);

            const { error } =
                await _supabase
                    .from('produtos')
                    .insert([{

                        nome,
                        descricao,
                        preco,
                        categoria,
                        imagem_url: publicUrl

                    }]);

            if (error) {

                alert('Erro salvar produto.');
                return;

            }

            limparFormulario();

            carregarProdutos();
            carregarProdutosAdmin();

            alert('Produto cadastrado.');

        }

        async function carregarProdutosAdmin() {

            const container =
                document.getElementById('lista-admin-produtos');

            container.innerHTML =
                '<p class="text-white/50 loading">Carregando...</p>';

            const { data, error } =
                await _supabase
                    .from('produtos')
                    .select('*')
                    .order('created_at', {
                        ascending: false
                    });

            if (error) {

                container.innerHTML =
                    '<p>Erro carregar produtos.</p>';

                return;

            }

            container.innerHTML =
                data.map(produto => `

                <div
                    class="bg-slate-800 border border-white/10 rounded-2xl p-4 flex flex-col md:flex-row gap-4 md:items-center md:justify-between">

                    <div
                        class="flex gap-4 items-center">

                        <img
                            src="${produto.imagem_url}"
                            class="w-20 h-20 rounded-2xl object-cover">

                        <div>

                            <h3
                                class="font-black text-lg">

                                ${produto.nome}

                            </h3>

                            <p
                                class="text-white/50 text-sm">

                                ${produto.categoria || 'Sem categoria'}

                            </p>

                            <p
                                class="text-amber-400 font-bold mt-1">

                                R$ ${Number(produto.preco).toFixed(2)}

                            </p>

                        </div>

                    </div>

                    <div
                        class="flex gap-3">

                        <button
                            onclick="editarProduto('${produto.id}')"
                            class="bg-blue-500 hover:bg-blue-400 transition px-5 py-3 rounded-xl font-bold">

                            Editar

                        </button>

                        <button
                            onclick="excluirProduto('${produto.id}')"
                            class="bg-red-500 hover:bg-red-400 transition px-5 py-3 rounded-xl font-bold">

                            Excluir

                        </button>

                    </div>

                </div>

                `).join('');

        }

        async function excluirProduto(id) {

            const confirmar =
                confirm('Excluir produto?');

            if (!confirmar) return;

            const { error } =
                await _supabase
                    .from('produtos')
                    .delete()
                    .eq('id', id);

            if (error) {

                alert('Erro excluir.');
                return;

            }

            carregarProdutos();
            carregarProdutosAdmin();

        }

        async function editarProduto(id) {

            const produto =
                listaProdutos.find(
                    p => String(p.id) === String(id)
                );

            if (!produto) return;

            const novoNome =
                prompt('Nome:', produto.nome);

            if (!novoNome) return;

            const novaDescricao =
                prompt('Descrição:', produto.descricao);

            const novoPreco =
                prompt('Preço:', produto.preco);

            const novaCategoria =
                prompt('Categoria:', produto.categoria);

            const { error } =
                await _supabase
                    .from('produtos')
                    .update({

                        nome: novoNome,
                        descricao: novaDescricao,
                        preco: novoPreco,
                        categoria: novaCategoria

                    })
                    .eq('id', id);

            if (error) {

                alert('Erro editar.');
                return;

            }

            carregarProdutos();
            carregarProdutosAdmin();

        }

        function limparFormulario() {

            document.getElementById('prod-img').value = '';
            document.getElementById('prod-nome').value = '';
            document.getElementById('prod-desc').value = '';
            document.getElementById('prod-preco').value = '';
            document.getElementById('prod-categoria').value = '';

        }

        // =========================================
        // FUNDO
        // =========================================

        async function carregarFundo() {

            const { data } =
                _supabase.storage
                    .from('imagens-produtos')
                    .getPublicUrl('fundo_catalogo.jpg');

            if (data?.publicUrl) {

                document
                    .getElementById('bg-dinamico')
                    .style.backgroundImage =
                    `url('${data.publicUrl}?t=${Date.now()}')`;

            }

        }

        // =========================================
        // CARRINHO
        // =========================================

        function adicionarCarrinho(id) {

            const produto =
                listaProdutos.find(
                    p => String(p.id) === String(id)
                );

            if (!produto) return;

            const existe =
                carrinho.find(
                    p => String(p.id) === String(id)
                );

            if (existe) {

                existe.qtd++;

            } else {

                carrinho.push({

                    ...produto,
                    qtd: 1

                });

            }

            renderizarCarrinho();

        }

        function removerItem(id) {

            carrinho =
                carrinho.filter(
                    p => String(p.id) !== String(id)
                );

            renderizarCarrinho();

        }

        function renderizarCarrinho() {

            let total = 0;

            document
                .getElementById('itens-carrinho')
                .innerHTML = carrinho.map(item => {

                    total +=
                        Number(item.preco) * item.qtd;

                    return `

                    <div
                        class="bg-slate-900 border border-white/10 rounded-2xl p-4 flex items-center justify-between">

                        <div
                            class="flex gap-3 items-center">

                            <img
                                src="${item.imagem_url}"
                                class="w-16 h-16 rounded-xl object-cover">

                            <div>

                                <h3
                                    class="font-bold">

                                    ${item.nome}

                                </h3>

                                <p
                                    class="text-white/50 text-sm">

                                    ${item.qtd}x

                                </p>

                            </div>

                        </div>

                        <button
                            onclick="removerItem('${item.id}')"
                            class="text-red-500 text-lg">

                            <i class="fas fa-trash"></i>

                        </button>

                    </div>

                    `;

                }).join('');

            document
                .getElementById('total-carrinho')
                .innerText =
                `R$ ${total.toFixed(2)}`;

            const badge =
                document.getElementById('cart-badge');

            badge.innerText = carrinho.length;

            badge.classList.toggle(
                'hidden',
                carrinho.length === 0
            );

        }

        // =========================================
        // FINALIZAR PEDIDO
        // =========================================

        function finalizarPedido() {

            if (carrinho.length === 0) {

                alert('Carrinho vazio.');
                return;

            }

            const nome =
                document.getElementById('cliente-nome').value;

            const endereco =
                document.getElementById('cliente-endereco').value;

            if (!nome || !endereco) {

                alert('Preencha nome e endereço.');
                return;

            }

            let total = 0;

            carrinho.forEach(item => {

                total +=
                    Number(item.preco) * item.qtd;

            });

            const pedido =
                carrinho.map(item =>
                    `- ${item.qtd}x ${item.nome}`
                ).join('\n');

            const mensagem = `
*DU LANCHE*

👤 Cliente: ${nome}
📍 Endereço: ${endereco}

${pedido}

💰 TOTAL: R$ ${total.toFixed(2)}
`;

            window.open(
                `https://wa.me/5531999999999?text=${encodeURIComponent(mensagem)}`
            );

        }

    </script>

</body>
