<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Du Lanche - Painel de Gestão</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <main class="container mx-auto p-4">
        <div id="aba-admin" class="max-w-lg mx-auto bg-slate-900 p-6 rounded-3xl mt-10">
            <h2 class="font-black text-lg mb-4 text-amber-500">Gestão de Categorias</h2>
            
            <div id="lista-realocacao" class="space-y-3">
                </div>
        </div>
    </main>

    <script>
        const _s = supabase.createClient("URL_DO_SEU_SUPABASE", "SUA_CHAVE_ANON");
        let lista = [];
        const categorias = ['Hamburguer', 'Batata', 'Caldos', 'Porcoes', 'Bebidas', 'Cachorro Quente', 'Combos'];

        async function carregar() {
            const { data } = await _s.from('produtos').select('*');
            lista = data || [];
            renderizarAdmin();
        }

        function renderizarAdmin() {
            const cont = document.getElementById('lista-realocacao');
            cont.innerHTML = lista.map(p => `
                <div class="flex justify-between items-center bg-slate-800 p-3 rounded-lg border border-white/5">
                    <span class="truncate w-1/2 text-sm font-bold">${p.nome}</span>
                    <select onchange="realocar('${p.id}', this.value)" class="bg-black text-white text-xs p-1 rounded border border-slate-700">
                        ${categorias.map(c => `<option value="${c}" ${p.categoria === c ? 'selected' : ''}>${c}</option>`).join('')}
                    </select>
                </div>
            `).join('');
        }

        async function realocar(id, novaCategoria) {
            const { error } = await _s.from('produtos').update({ categoria: novaCategoria }).eq('id', id);
            if (!error) {
                alert("Produto realocado com sucesso!");
                await carregar(); // Atualiza a lista após a mudança
            } else {
                alert("Erro ao realocar: " + error.message);
            }
        }

        window.onload = carregar;
    </script>
</body>
</html>
