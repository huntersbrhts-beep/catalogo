<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Du Lanche - Sistema Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4">

    <div class="flex gap-2 overflow-x-auto py-4">
        <button onclick="filtrar('Todos')" class="bg-amber-500 px-4 py-2 rounded-full font-bold">Todos</button>
        <button onclick="filtrar('Hamburguer')" class="bg-slate-700 px-4 py-2 rounded-full font-bold">Hamburguer</button>
        <button onclick="filtrar('Batata')" class="bg-slate-700 px-4 py-2 rounded-full font-bold">Batata</button>
        <button onclick="filtrar('Bebidas')" class="bg-slate-700 px-4 py-2 rounded-full font-bold">Bebidas</button>
    </div>

    <div id="grid-produtos" class="grid grid-cols-2 gap-4"></div>

    <div class="mt-10 p-6 bg-slate-800 rounded-xl">
        <h2 class="text-xl font-bold mb-4">Painel Administrativo</h2>
        <input type="email" id="email" placeholder="Email" class="w-full p-2 mb-2 text-black rounded">
        <input type="password" id="senha" placeholder="Senha" class="w-full p-2 mb-4 text-black rounded">
        <button onclick="logar()" class="bg-blue-600 w-full p-2 rounded">Entrar no Painel</button>
        
        <div id="lista-edicao" class="mt-6 hidden">
            <h3 class="font-bold mb-2">Realocar Categorias:</h3>
            <div id="container-edicao" class="space-y-2"></div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient("https://yawousokoaqeyvktjosj.supabase.co", "sb_publishable__TXuxjZ8PObBZxsM-PjF1Q_fAvPsDa3");
        let produtos = [];

        async function carregar() {
            const { data } = await _s.from('produtos').select('*');
            produtos = data || [];
            filtrar('Todos');
        }

        function filtrar(cat) {
            const grid = document.getElementById('grid-produtos');
            const lista = cat === 'Todos' ? produtos : produtos.filter(p => p.categoria === cat);
            grid.innerHTML = lista.map(p => `
                <div class="bg-slate-800 p-2 rounded-lg">
                    <img src="${p.imagem_url}" class="h-20 w-full object-cover rounded">
                    <p class="font-bold text-xs">${p.nome}</p>
                    <p class="text-amber-500">R$ ${p.preco}</p>
                </div>
            `).join('');
        }

        async function logar() {
            const { error } = await _s.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('senha').value });
            if (!error) {
                document.getElementById('lista-edicao').classList.remove('hidden');
                carregarEdicao();
            } else alert("Erro no login");
        }

        async function carregarEdicao() {
            const cont = document.getElementById('container-edicao');
            cont.innerHTML = produtos.map(p => `
                <div class="flex justify-between bg-slate-900 p-2 rounded text-xs">
                    <span>${p.nome}</span>
                    <select onchange="atualizar('${p.id}', this.value)" class="text-black">
                        ${['Hamburguer','Batata','Caldos','Porcoes','Bebidas','Combos'].map(c => 
                            `<option value="${c}" ${p.categoria === c ? 'selected' : ''}>${c}</option>`).join('')}
                    </select>
                </div>
            `).join('');
        }

        async function atualizar(id, cat) {
            await _s.from('produtos').update({ categoria: cat }).eq('id', id);
            alert("Categoria alterada!");
            carregar();
        }

        window.onload = carregar;
    </script>
</body>
</html>
