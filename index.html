<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Du Lanche - Catálogo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .zoom-modal { display: none; }
        .zoom-modal.active { display: flex; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        /* Fundo Responsivo e Fixo */
        #bg-dinamico {
            background-attachment: fixed;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex flex-col min-h-screen">

    <div id="bg-dinamico" class="fixed inset-0 z-[-2] pointer-events-none"></div>
    <div class="fixed inset-0 z-[-1] pointer-events-none bg-slate-950/60"></div>

    <header class="bg-slate-900/95 backdrop-blur text-white shadow-lg sticky top-0 z-40 border-b border-slate-800">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="mudarAba('catalogo')">
                <div class="bg-amber-500 p-1.5 rounded-lg text-slate-950"><i class="fas fa-hamburger text-lg"></i></div>
                <h1 class="text-lg font-black tracking-tight text-amber-500">Du<span class="text-white font-light">LANCHE</span></h1>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="mudarAba('admin')" class="text-[10px] bg-slate-800 px-3 py-1.5 rounded-lg font-bold"><i class="fas fa-shield-alt text-amber-500 mr-1"></i> ADMIN</button>
                <button onclick="toggleCarrinho()" class="relative p-2 bg-amber-500 rounded-lg text-slate-950"><i class="fas fa-shopping-bag text-sm"></i><span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-black hidden">0</span></button>
            </div>
        </div>
    </header>

    <main id="aba-catalogo" class="tab-content active container mx-auto p-4 flex-grow">
        <div id="grid-produtos" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
            <div class="col-span-full text-center py-20 text-white font-bold">Carregando cardápio...</div>
        </div>
    </main>

    <main id="aba-admin" class="tab-content container mx-auto p-4 flex-grow">
        <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-xl">
            <div id="secao-login" class="space-y-4">
                <h2 class="font-bold text-lg">Login Admin</h2>
                <input type="email" id="login-email" placeholder="E-mail" class="w-full p-2 border rounded-lg text-sm">
                <input type="password" id="login-senha" placeholder="Senha" class="w-full p-2 border rounded-lg text-sm">
                <button onclick="fazerLogin()" class="w-full bg-amber-500 py-2 rounded-lg font-bold text-sm">Entrar</button>
            </div>
            <div id="secao-admin-painel" class="hidden space-y-4">
                <h2 class="font-bold">Painel de Controle</h2>
                <button onclick="fazerLogout()" class="text-xs text-red-500 underline">Sair</button>
                <div class="border-t pt-4">
                    <p class="text-xs font-bold mb-2 uppercase text-slate-500">Alterar Fundo</p>
                    <input type="file" id="fundo-imagem-input" class="text-xs w-full mb-2">
                    <button onclick="salvarImagemFundo()" id="btn-fundo" class="w-full bg-slate-900 text-white py-2 rounded-lg text-xs font-bold">Atualizar Fundo</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const _supabase = supabase.createClient("https://yawousokoaqeyvktjosj.supabase.co", "sb_publishable__TXuxjZ8PObBZxsM-PjF1Q_fAvPsDa3");

        document.addEventListener("DOMContentLoaded", () => {
            carregarProdutosDoBanco();
            carregarImagemFundo();
        });

        function carregarImagemFundo() {
            const bgContainer = document.getElementById('bg-dinamico');
            const { data } = _supabase.storage.from('imagens-produtos').getPublicUrl('fundo_catalogo.jpg');
            if (data) bgContainer.style.backgroundImage = `url('${data.publicUrl}?v=${new Date().getTime()}')`;
        }

        function renderizarProdutosNoHtml() {
            const grid = document.getElementById('grid-produtos');
            grid.innerHTML = listaProdutos.map(prod => `
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden flex flex-col group">
                    <div class="h-32 overflow-hidden relative cursor-pointer" onclick="abrirZoom('${prod.imagem_url}')">
                        <img src="${prod.imagem_url}" class="w-full h-full object-cover">
                        <div class="absolute bottom-1 right-1 bg-black/50 text-white px-1 rounded text-[9px]"><i class="fas fa-search-plus"></i></div>
                    </div>
                    <div class="p-2 flex flex-col flex-grow">
                        <h3 class="font-bold text-xs truncate">${prod.nome}</h3>
                        <p class="text-[10px] text-slate-500 line-clamp-2">${prod.descricao}</p>
                        <div class="mt-auto pt-2 flex justify-between items-center">
                            <span class="font-black text-sm">R$ ${parseFloat(prod.preco).toFixed(2).replace('.', ',')}</span>
                            <button onclick="adicionarNoCarrinho('${prod.id}')" class="bg-slate-900 text-white px-2 py-1 rounded text-[10px] font-bold">+ Pedir</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function salvarImagemFundo() {
            const input = document.getElementById('fundo-imagem-input');
            const arquivo = input.files[0];
            if (!arquivo) return alert("Selecione a imagem!");

            try {
                const { error } = await _supabase.storage.from('imagens-produtos').upload('fundo_catalogo.jpg', arquivo, { upsert: true });
                if (error) throw error;
                alert("Fundo atualizado!");
                carregarImagemFundo();
            } catch (err) { alert("Erro: " + err.message); }
        }

        // Mantenha o restante das funções originais (carrinho, login, etc) abaixo...
    </script>
</body>
</html>
