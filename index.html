<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Du Lanches</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--primary:#ff7a00;
--primary-dark:#e86800;
--bg:#0f0f10;
--card:#1a1a1d;
--text:#ffffff;
--muted:#b3b3b3;
--border:#2a2a2d;
}

body{
background:linear-gradient(180deg,#0f0f10 0%,#1a1a1d 100%);
color:var(--text);
}

.zoom-modal{display:none;}
.zoom-modal.active{display:flex;}
.tab-content{display:none;}
.tab-content.active{display:block;}

header{
background:rgba(15,15,16,0.92);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.05);
}

.categoria-ativa{
background:linear-gradient(135deg,#ff7a00,#ff9d00)!important;
color:white!important;
border:none!important;
box-shadow:0 10px 25px rgba(255,122,0,0.35);
}

.categoria-btn{
background:#1a1a1d;
color:#fff;
border:1px solid #2a2a2d;
transition:0.3s;
}

.categoria-btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.card-produto{
background:#1a1a1d;
border:1px solid #2a2a2d;
border-radius:22px;
overflow:hidden;
transition:0.35s;
}

.card-produto:hover{
transform:translateY(-5px);
box-shadow:0 15px 35px rgba(0,0,0,0.35);
}

.card-produto img{
transition:0.4s;
}

.card-produto:hover img{
transform:scale(1.06);
}

.btn-primary{
background:linear-gradient(135deg,#ff7a00,#ff9d00);
color:white;
font-weight:bold;
border:none;
transition:0.3s;
}

.btn-primary:hover{
transform:translateY(-2px);
filter:brightness(1.05);
}

.glass{
background:rgba(255,255,255,0.04);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.06);
}

input,textarea,select{
background:#111!important;
color:#fff!important;
border:1px solid #2a2a2d!important;
}

input::placeholder,
textarea::placeholder{
color:#777;
}

#sidebar-carrinho{
background:#161618!important;
color:#fff;
}

.admin-card{
background:#111;
border:1px solid #2a2a2d;
border-radius:18px;
padding:15px;
}

.admin-img{
width:80px;
height:80px;
object-fit:cover;
border-radius:14px;
}
</style>
</head>

<body class="font-sans flex flex-col min-h-screen">

<header class="sticky top-0 z-40">
<div class="container mx-auto px-4 py-4 flex justify-between items-center">

<div>
<h1 class="text-3xl font-black tracking-wide cursor-pointer" onclick="mudarAba('catalogo')">
<span class="text-orange-500">DU</span> LANCHES
</h1>
<p class="text-xs text-gray-400 tracking-[4px] uppercase">Pedido Online</p>
</div>

<div class="flex items-center gap-3">
<button onclick="mudarAba('admin')" class="glass px-4 py-2 rounded-xl text-sm font-semibold hover:scale-105 transition">
<i class="fas fa-lock mr-2"></i> Admin
</button>

<button onclick="toggleCarrinho()" class="relative btn-primary p-3 rounded-2xl shadow-lg">
<i class="fas fa-shopping-bag text-xl"></i>
<span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold hidden">0</span>
</button>
</div>

</div>
</header>

<section class="relative overflow-hidden">
<div class="container mx-auto px-4 py-10 md:py-16">
<div class="grid md:grid-cols-2 gap-10 items-center">
<div>
<span class="inline-block bg-orange-500/20 text-orange-400 px-4 py-2 rounded-full text-sm font-bold mb-4">
🍔 O Melhor Lanche do Barreiro
</span>

<h2 class="text-5xl md:text-6xl font-black leading-tight mb-6">
Sabor que <span class="text-orange-500">marca</span> memórias.
</h2>

<p class="text-gray-400 text-lg leading-relaxed mb-8">
Hambúrguer, combos especiais.
</p>
</div>
</div>
</div>
</section>

<main id="aba-catalogo" class="tab-content active container mx-auto p-4 flex-grow">

<div id="filtros-categorias" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
<button onclick="filtrarCategoria('todos',this)" class="categoria-btn categoria-ativa p-3 rounded-xl shadow font-bold">
🍔 Todos
</button>
</div>

<div id="grid-produtos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

</main>

<main id="aba-admin" class="tab-content container mx-auto p-4 flex-grow">

<div class="max-w-5xl mx-auto mt-6">

<button onclick="mudarAba('catalogo')" class="mb-4 text-orange-400 hover:text-orange-500 font-semibold">
← Voltar
</button>

<div id="secao-login" class="glass p-6 rounded-2xl">
<h2 class="text-2xl font-bold mb-6 text-center">Login Admin</h2>

<div class="space-y-4">
<input type="email" id="login-email" placeholder="E-mail" class="w-full p-3 rounded-xl">
<input type="password" id="login-senha" placeholder="Senha" class="w-full p-3 rounded-xl">

<button onclick="fazerLogin()" class="w-full btn-primary p-3 rounded-xl">
Entrar
</button>
</div>
</div>

<div id="secao-admin-painel" class="glass p-6 rounded-2xl hidden">

<div class="flex justify-between items-center mb-6">
<h2 class="text-2xl font-bold">Novo Produto</h2>

<button onclick="fazerLogout()" class="bg-gray-700 px-4 py-2 rounded-xl">
Sair
</button>
</div>

<form id="form-produto" onsubmit="salvarProduto(event)" class="space-y-4">

<input type="text" id="prod-nome" placeholder="Nome" required class="w-full p-3 rounded-xl">

<textarea id="prod-descricao" placeholder="Descrição" rows="3" class="w-full p-3 rounded-xl"></textarea>

<div class="flex gap-2">
<input type="text" id="nova-categoria" placeholder="Nova categoria" class="flex-1 p-3 rounded-xl">

<button type="button" onclick="criarCategoria()" class="btn-primary px-4 rounded-xl">
+
</button>
</div>

<select id="prod-categoria" class="w-full p-3 rounded-xl">
<option value="hamburguer">Hambúrguer</option>
<option value="bebida">Bebida</option>
<option value="combo">Combo</option>
</select>

<input type="number" step="0.01" id="prod-preco" placeholder="Preço" required class="w-full p-3 rounded-xl">

<input type="file" id="prod-imagem" accept="image/*" required class="w-full p-3 rounded-xl">

<button type="submit" class="w-full btn-primary p-4 rounded-xl text-lg">
Cadastrar Produto
</button>

</form>

<div class="mt-10 border-t border-gray-700 pt-6">
<h2 class="text-2xl font-bold mb-4">Produtos Cadastrados</h2>
<div id="lista-admin-produtos" class="space-y-4"></div>
</div>

</div>

</div>
</main>

<div id="sidebar-carrinho" class="fixed inset-y-0 right-0 w-full max-w-md shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">

<div class="p-4 flex justify-between items-center border-b border-gray-700">
<h3 class="text-lg font-bold">Seu Pedido</h3>
<button onclick="toggleCarrinho()" class="text-2xl font-bold">×</button>
</div>

<div id="itens-carrinho" class="p-4 flex-grow overflow-y-auto space-y-4">
<p class="text-center text-gray-500">Carrinho vazio</p>
</div>

<div class="p-4 border-t border-gray-700 space-y-3">

<div class="flex justify-between font-bold text-lg">
<span>Total:</span>
<span id="total-carrinho">R$ 0,00</span>
</div>

<input type="text" id="cliente-nome" placeholder="Seu nome" class="w-full p-3 rounded-xl">
<input type="text" id="cliente-telefone" placeholder="Seu telefone" class="w-full p-3 rounded-xl">

<div class="flex gap-2">
<button type="button" id="btn-entrega" onclick="selecionarTipoPedido('entrega')" class="flex-1 btn-primary py-3 rounded-xl">
🚚 Entrega
</button>

<button type="button" id="btn-retirada" onclick="selecionarTipoPedido('retirada')" class="flex-1 bg-gray-700 py-3 rounded-xl">
🛍️ Retirada
</button>
</div>

<div id="box-endereco">
<input type="text" id="cliente-endereco" placeholder="Seu endereço" class="w-full p-3 rounded-xl">
</div>

<div id="info-vip" class="hidden bg-green-500/20 text-green-400 p-3 rounded-xl text-sm"></div>

<button onclick="enviarWhatsApp()" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-xl font-bold text-lg">
<i class="fab fa-whatsapp"></i> Enviar Pedido
</button>

</div>
</div>

<script>
const SUPABASE_URL = "https://yawousokoaqeyvktjosj.supabase.co";
const SUPABASE_KEY = "sb_publishable__TXuxjZ8PObBZxsM-PjF1Q_fAvPsDa3";
const WHATSAPP_NUMERO = "5531999999999";

const _supabase = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let listaProdutos = [];
let carrinhoCompras = [];
let categoriaAtual = 'todos';
let tipoPedido = 'entrega';

document.addEventListener('DOMContentLoaded',()=>{
carregarProdutosDoBanco();
verificarEstadoLogin();
atualizarCategoriasFiltro();
});

function mudarAba(nome){
document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
document.getElementById('aba-'+nome).classList.add('active');
}

function filtrarCategoria(categoria,btn){
categoriaAtual = categoria;
document.querySelectorAll('.categoria-btn').forEach(b=>b.classList.remove('categoria-ativa'));
btn.classList.add('categoria-ativa');
renderizarProdutosNoHtml();
}

async function carregarProdutosDoBanco(){
const { data,error } = await _supabase
.from('produtos')
.select('*')
.order('nome',{ascending:true});

if(error){
console.log(error);
return;
}

listaProdutos = data || [];
renderizarProdutosNoHtml();
renderizarProdutosAdmin();
atualizarCategoriasComProdutos();
}

function renderizarProdutosNoHtml(){
const grid = document.getElementById('grid-produtos');

let produtos = listaProdutos;

if(categoriaAtual !== 'todos'){
produtos = listaProdutos.filter(p=>p.categoria === categoriaAtual);
}

if(produtos.length===0){
grid.innerHTML = '<p class="col-span-full text-center text-gray-500">Nenhum produto encontrado</p>';
return;
}

grid.innerHTML = produtos.map(prod=>`
<div class="card-produto">

<div class="overflow-hidden h-52">
<img src="${prod.imagem_url || ''}" class="w-full h-full object-cover">
</div>

<div class="p-5">

<h3 class="font-bold text-xl mb-2">${prod.nome}</h3>

<p class="text-gray-400 text-sm mb-4">${prod.descricao || ''}</p>

<div class="flex justify-between items-center">

<span class="text-orange-400 font-bold text-lg">
R$ ${parseFloat(prod.preco || 0).toFixed(2)}
</span>

<button onclick="adicionarNoCarrinho('${prod.id}')" class="btn-primary px-4 py-2 rounded-xl shadow-lg">
Adicionar
</button>

</div>
</div>
</div>
`).join('');
}

function renderizarProdutosAdmin(){
const box = document.getElementById('lista-admin-produtos');

if(!box) return;

if(listaProdutos.length===0){
box.innerHTML = '<p class="text-gray-500">Nenhum produto cadastrado.</p>';
return;
}

box.innerHTML = listaProdutos.map(prod=>`
<div class="admin-card">

<div class="flex flex-col md:flex-row gap-4">

<img src="${prod.imagem_url || ''}" class="admin-img">

<div class="flex-1 space-y-3">

<input type="text" id="edit-nome-${prod.id}" value="${escaparHtml(prod.nome || '')}" class="w-full p-3 rounded-xl">

<textarea id="edit-desc-${prod.id}" rows="2" class="w-full p-3 rounded-xl">${escaparHtml(prod.descricao || '')}</textarea>

<div class="grid grid-cols-1 md:grid-cols-2 gap-3">

<input type="number" step="0.01" id="edit-preco-${prod.id}" value="${prod.preco || 0}" class="w-full p-3 rounded-xl">

<select id="edit-categoria-${prod.id}" class="w-full p-3 rounded-xl">
${gerarOptionsCategoria(prod.categoria)}
</select>

</div>

<div>
<label class="text-xs text-gray-400">Trocar imagem opcional:</label>
<input type="file" id="edit-imagem-${prod.id}" accept="image/*" class="w-full p-2 rounded-xl">
</div>

<div class="flex flex-wrap gap-2">

<button onclick="editarProduto('${prod.id}')" class="btn-primary px-4 py-2 rounded-xl">
Salvar alterações
</button>

<button onclick="excluirProduto('${prod.id}')" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl font-bold">
Excluir
</button>

</div>

</div>
</div>
</div>
`).join('');
}

function escaparHtml(valor){
return String(valor)
.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;')
.replace(/"/g,'&quot;')
.replace(/'/g,'&#039;');
}

function gerarOptionsCategoria(categoriaAtualProduto){
const select = document.getElementById('prod-categoria');

return [...select.options].map(op=>`
<option value="${op.value}" ${op.value === categoriaAtualProduto ? 'selected' : ''}>
${op.textContent}
</option>
`).join('');
}

async function editarProduto(id){
const nome = document.getElementById('edit-nome-'+id).value.trim();
const descricao = document.getElementById('edit-desc-'+id).value.trim();
const preco = parseFloat(document.getElementById('edit-preco-'+id).value);
const categoria = document.getElementById('edit-categoria-'+id).value;
const arquivo = document.getElementById('edit-imagem-'+id).files[0];

if(!nome){
alert('Informe o nome do produto.');
return;
}

if(isNaN(preco)){
alert('Informe um preço válido.');
return;
}

let dadosAtualizados = {
nome,
descricao,
preco,
categoria
};

if(arquivo){
const nomeArquivo = Date.now() + '_' + arquivo.name;

const { error:uploadError } = await _supabase.storage
.from('imagens-produtos')
.upload(nomeArquivo,arquivo);

if(uploadError){
alert(uploadError.message);
return;
}

const { data:urlData } = _supabase.storage
.from('imagens-produtos')
.getPublicUrl(nomeArquivo);

dadosAtualizados.imagem_url = urlData.publicUrl;
}

const { error } = await _supabase
.from('produtos')
.update(dadosAtualizados)
.eq('id',id);

if(error){
alert(error.message);
return;
}

alert('Produto atualizado com sucesso!');
carregarProdutosDoBanco();
}

async function excluirProduto(id){
if(!confirm('Tem certeza que deseja excluir este produto?')) return;

const { error } = await _supabase
.from('produtos')
.delete()
.eq('id',id);

if(error){
alert(error.message);
return;
}

alert('Produto excluído com sucesso!');
carregarProdutosDoBanco();
}

function toggleCarrinho(){
document.getElementById('sidebar-carrinho').classList.toggle('translate-x-full');
}

function adicionarNoCarrinho(id){
const produto = listaProdutos.find(p=>p.id===id);
if(!produto) return;

const existe = carrinhoCompras.find(i=>i.id===id);

if(existe){
existe.quantidade++;
}else{
carrinhoCompras.push({...produto,quantidade:1});
}

atualizarCarrinho();
}

function atualizarCarrinho(){
const container = document.getElementById('itens-carrinho');
const contador = document.getElementById('cart-count');

let total = 0;
let itens = 0;

if(carrinhoCompras.length===0){
container.innerHTML = '<p class="text-center text-gray-500">Carrinho vazio</p>';
contador.classList.add('hidden');
document.getElementById('total-carrinho').textContent='R$ 0,00';
return;
}

container.innerHTML = carrinhoCompras.map(item=>{
total += item.preco * item.quantidade;
itens += item.quantidade;

return `
<div class="flex justify-between items-center border-b border-gray-700 pb-3">

<div>
<h4 class="font-bold">${item.nome}</h4>
<p class="text-gray-400 text-sm">${item.quantidade}x</p>
</div>

<div class="flex items-center gap-2">
<button onclick="alterarQtd('${item.id}',-1)" class="bg-gray-700 px-3 py-1 rounded">-</button>
<button onclick="alterarQtd('${item.id}',1)" class="bg-gray-700 px-3 py-1 rounded">+</button>
</div>

</div>
`;
}).join('');

contador.textContent = itens;
contador.classList.remove('hidden');

document.getElementById('total-carrinho').textContent =
`R$ ${total.toFixed(2)}`;
}

function alterarQtd(id,valor){
const item = carrinhoCompras.find(i=>i.id===id);
if(!item) return;

item.quantidade += valor;

if(item.quantidade <=0){
carrinhoCompras = carrinhoCompras.filter(i=>i.id!==id);
}

atualizarCarrinho();
}

function selecionarTipoPedido(tipo){
tipoPedido = tipo;

const endereco = document.getElementById('box-endereco');
const btnEntrega = document.getElementById('btn-entrega');
const btnRetirada = document.getElementById('btn-retirada');

if(tipo === 'retirada'){
endereco.style.display='none';
btnRetirada.className = 'flex-1 btn-primary py-3 rounded-xl';
btnEntrega.className = 'flex-1 bg-gray-700 py-3 rounded-xl';
}else{
endereco.style.display='block';
btnEntrega.className = 'flex-1 btn-primary py-3 rounded-xl';
btnRetirada.className = 'flex-1 bg-gray-700 py-3 rounded-xl';
}
}

function buscarHistorico(telefone){
const dados = JSON.parse(localStorage.getItem('historico_clientes') || '{}');

return dados[telefone] || {
pedidos:0,
total:0
};
}

function salvarHistorico(telefone,valor){
const dados = JSON.parse(localStorage.getItem('historico_clientes') || '{}');

if(!dados[telefone]){
dados[telefone]={
pedidos:0,
total:0
};
}

dados[telefone].pedidos +=1;
dados[telefone].total += valor;

localStorage.setItem('historico_clientes',JSON.stringify(dados));
}

function calcularDesconto(telefone,total){
const cliente = buscarHistorico(telefone);

let desconto = 0;

if(cliente.pedidos >= 5){
desconto = total * 0.05;
}

if(cliente.pedidos >= 10){
desconto = total * 0.10;
}

return desconto;
}

function enviarWhatsApp(){
if(carrinhoCompras.length===0){
alert('Carrinho vazio');
return;
}

const nome = document.getElementById('cliente-nome').value.trim();
const telefone = document.getElementById('cliente-telefone').value.trim();
const endereco = document.getElementById('cliente-endereco').value.trim();

if(!nome){
alert('Informe nome');
return;
}

if(!telefone){
alert('Informe telefone');
return;
}

if(tipoPedido === 'entrega' && !endereco){
alert('Informe endereço');
return;
}

let total = 0;

let msg = `🍔 *NOVO PEDIDO - DU LANCHES* 🍔\n\n`;

msg += `👤 ${nome}\n`;
msg += `📞 ${telefone}\n`;
msg += `🛒 ${tipoPedido}\n`;

if(tipoPedido === 'entrega'){
msg += `📍 ${endereco}\n`;
}

msg += `\n----------------\n\n`;

carrinhoCompras.forEach(item=>{
const subtotal = item.preco * item.quantidade;
total += subtotal;

msg += `${item.quantidade}x ${item.nome}\n`;
msg += `R$ ${subtotal.toFixed(2)}\n\n`;
});

const desconto = calcularDesconto(telefone,total);
const totalFinal = total - desconto;

if(desconto > 0){
msg += `🎁 Desconto: -R$ ${desconto.toFixed(2)}\n`;
}

msg += `🧾 TOTAL: R$ ${totalFinal.toFixed(2)}`;

salvarHistorico(telefone,totalFinal);

window.open(
`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMERO}&text=${encodeURIComponent(msg)}`,
'_blank'
);
}

function verificarEstadoLogin(){
_supabase.auth.onAuthStateChange((event,session)=>{

if(session){
document.getElementById('secao-login').classList.add('hidden');
document.getElementById('secao-admin-painel').classList.remove('hidden');
carregarProdutosDoBanco();
}else{
document.getElementById('secao-login').classList.remove('hidden');
document.getElementById('secao-admin-painel').classList.add('hidden');
}
});
}

async function fazerLogin(){
const email = document.getElementById('login-email').value.trim();
const senha = document.getElementById('login-senha').value.trim();

if(!email || !senha){
alert('Preencha e-mail e senha.');
return;
}

const { error } = await _supabase.auth.signInWithPassword({
email,
password:senha
});

if(error){
alert(error.message);
}
}

async function fazerLogout(){
await _supabase.auth.signOut();
}

async function salvarProduto(e){
e.preventDefault();

const nome = document.getElementById('prod-nome').value.trim();
const descricao = document.getElementById('prod-descricao').value.trim();
const categoria = document.getElementById('prod-categoria').value;
const preco = parseFloat(document.getElementById('prod-preco').value);
const arquivo = document.getElementById('prod-imagem').files[0];

if(!nome){
alert('Informe o nome.');
return;
}

if(isNaN(preco)){
alert('Informe preço válido.');
return;
}

if(!arquivo){
alert('Selecione uma imagem.');
return;
}

const nomeArquivo = Date.now() + '_' + arquivo.name;

const { error:uploadError } = await _supabase.storage
.from('imagens-produtos')
.upload(nomeArquivo,arquivo);

if(uploadError){
alert(uploadError.message);
return;
}

const { data:urlData } = _supabase.storage
.from('imagens-produtos')
.getPublicUrl(nomeArquivo);

const imagem_url = urlData.publicUrl;

const { error } = await _supabase
.from('produtos')
.insert([{
nome,
descricao,
categoria,
preco,
imagem_url
}]);

if(error){
alert(error.message);
return;
}

alert('Produto cadastrado');

document.getElementById('form-produto').reset();

function criarCategoria(){
const input = document.getElementById('nova-categoria');
const nome = input.value.trim();

if(!nome){
alert('Digite categoria');
return;
}

const valor = nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-');

const select = document.getElementById('prod-categoria');

const existe = [...select.options].some(op=>op.value === valor);

if(existe){
alert('Categoria já existe.');
return;
}

const option = document.createElement('option');
option.value = valor;
option.textContent = nome;

select.appendChild(option);

input.value = '';

atualizarCategoriasFiltro();
renderizarProdutosAdmin();
}

function atualizarCategoriasComProdutos(){
const select = document.getElementById('prod-categoria');

listaProdutos.forEach(prod=>{
if(!prod.categoria) return;

const existe = [...select.options].some(op=>op.value === prod.categoria);

if(!existe){
const option = document.createElement('option');
option.value = prod.categoria;
option.textContent = prod.categoria;
select.appendChild(option);
}
});

atualizarCategoriasFiltro();
}

function atualizarCategoriasFiltro(){
const select = document.getElementById('prod-categoria');
const container = document.getElementById('filtros-categorias');

container.innerHTML = `
<button onclick="filtrarCategoria('todos',this)" class="categoria-btn categoria-ativa p-3 rounded-xl shadow font-bold">
🍔 Todos
</button>
`;

[...select.options].forEach(op=>{
container.innerHTML += `
<button onclick="filtrarCategoria('${op.value}',this)" class="categoria-btn p-3 rounded-xl shadow">
${op.textContent}
</button>
`;
});
}
</script>
