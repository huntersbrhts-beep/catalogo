<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Du Lanche - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="text-white min-h-screen">

    <header class="p-5 border-b border-white/10 flex justify-between items-center">
        <h1 class="text-2xl font-black text-amber-400">DU LANCHE ADMIN</h1>
        <button onclick="mudarAba('catalogo')" class="bg-slate-800 px-4 py-2 rounded-lg">Voltar ao Site</button>
    </header>

    <main class="container mx-auto p-6">
        <section id="aba-admin" class="tab-content active">
            <div class="grid md:grid-cols-[240px_1fr] gap-6">
                <div class="bg-slate-900 border border-white/10 rounded-3xl p-5 h-fit">
                    <div class="space-y-2">
                        <button onclick="trocarAdminTab('produtos')" class="w-full bg-amber-500 text-black py-3 rounded-xl font-bold">Produtos</button>
                        <button onclick="trocarAdminTab('categorias')" class="w-full bg-slate-800 py-3 rounded-xl font-bold">Categorias</button>
                    </div>
                </div>

                <div id="admin-content" class="bg-slate-900 border border-white/10 rounded-3xl p-6">
                    </div>
            </div>
        </section>
    </main>

    <script>
        const _supabase = supabase.createClient(
            "SUA_URL_SUPABASE",
            "SUA_KEY_SUPABASE"
        );

        const adminViews = {
            produtos: `
                <h2 class="text-2xl font-black mb-6">Adicionar Produto</h2>
                <div class="grid md:grid-cols-2 gap-4">
                    <input type="file" id="prod-img" class="bg-slate-800 rounded-xl p-3 text-sm">
                    <input type="text" id="prod-nome" placeholder="Nome" class="bg-slate-800 rounded-xl p-4 outline-none">
                    <input type="text" id="prod-categoria" placeholder="Categoria" class="bg-slate-800 rounded-xl p-4 outline-none">
                    <input type="number" id="prod-preco" placeholder="Preço" class="bg-slate-800 rounded-xl p-4 outline-none">
                </div>
                <textarea id="prod-desc" placeholder="Descrição" class="bg-slate-800 rounded-xl p-4 w-full h-32 mt-4"></textarea>
                <button onclick="adicionarProduto()" class="mt-5 bg-amber-500 hover:bg-amber-400 text-black font-black px-8 py-4 rounded-2xl transition">CADASTRAR PRODUTO</button>
            `,
            categorias: `<h2 class="text-2xl font-black">Gestão de Categorias</h2><p class="mt-4 text-white/60">Em desenvolvimento...</p>`
        };

        function trocarAdminTab(aba) {
            document.getElementById('admin-content').innerHTML = adminViews[aba];
        }

        async function adicionarProduto() {
            const fileInput = document.getElementById('prod-img');
            const file = fileInput.files[0];
            const nome = document.getElementById('prod-nome').value;
            const preco = document.getElementById('prod-preco').value;
            const categoria = document.getElementById('prod-categoria').value;
            const descricao = document.getElementById('prod-desc').value;

            if (!file || !nome || !preco) return alert('Preencha os campos obrigatórios!');

            const fileName = `produto_${Date.now()}.jpg`;

            // 1. Upload Imagem
            const { error: uploadError } = await _supabase.storage.from('imagens-produtos').upload(fileName, file);
            if (uploadError) return alert('Erro no upload: ' + uploadError.message);

            // 2. URL Pública
            const { data: { publicUrl } } = _supabase.storage.from('imagens-produtos').getPublicUrl(fileName);

            // 3. Inserir no Banco
            const { error: dbError } = await _supabase.from('produtos').insert([{
                nome, descricao, preco: parseFloat(preco), categoria, imagem_url: publicUrl
            }]);

            if (dbError) return alert('Erro ao salvar no banco: ' + dbError.message);

            alert('Produto cadastrado com sucesso!');
            fileInput.value = '';
            document.getElementById('prod-nome').value = '';
            document.getElementById('prod-preco').value = '';
        }

        // Inicializa na aba produtos
        window.onload = () => trocarAdminTab('produtos');
    </script>
</body>
</html>
