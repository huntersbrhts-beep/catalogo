<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Du Lanches</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="font-sans flex flex-col min-h-screen">

<header class="sticky top-0 z-40">
<div class="container mx-auto px-4 py-4 flex justify-between items-center">
<div>
<h1 class="text-3xl font-black tracking-wide cursor-pointer" onclick="mudarAba('catalogo')">
<span class="text-orange-500">DU</span> LANCHES
</h1>
<p class="text-xs text-gray-400 tracking-[4px] uppercase">Pedido Online</p>
</div>
<div class="flex items-center gap-3">
<button onclick="mudarAba('admin')" class="glass px-4 py-2 rounded-xl text-sm font-semibold hover:scale-105 transition">
<i class="fas fa-lock mr-2"></i> Admin
</button>
<button onclick="toggleCarrinho()" class="relative btn-primary p-3 rounded-2xl shadow-lg">
<i class="fas fa-shopping-bag text-xl"></i>
<span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold hidden">0</span>
</button>
</div>
</div>
</header>

<section class="relative overflow-hidden">
<div class="container mx-auto px-4 py-10 md:py-16">
<div class="grid md:grid-cols-2 gap-10 items-center">
<div>
<span class="inline-block bg-orange-500/20 text-orange-400 px-4 py-2 rounded-full text-sm font-bold mb-4">🍔 O Melhor Lanche do Barreiro</span>
<h2 class="text-5xl md:text-6xl font-black leading-tight mb-6">Sabor que <span class="text-orange-500">marca</span> memórias.</h2>
<p class="text-gray-400 text-lg leading-relaxed mb-8">Hambúrguer, combos especiais.</p>
</div>
</div>
</div>
</section>

<main id="aba-catalogo" class="tab-content active container mx-auto p-4 flex-grow">
<div id="filtros-categorias" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
<button onclick="filtrarCategoria('todos',this)" class="categoria-btn categoria-ativa p-3 rounded-xl shadow font-bold">🍔 Todos</button>
</div>
<div id="grid-produtos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
</main>

<main id="aba-admin" class="tab-content container mx-auto p-4 flex-grow">
<div class="max-w-5xl mx-auto mt-6">
<button onclick="mudarAba('catalogo')" class="mb-4 text-orange-400 hover:text-orange-500 font-semibold">← Voltar</button>
<div id="secao-login" class="glass p-6 rounded-2xl">
<h2 class="text-2xl font-bold mb-6 text-center">Login Admin</h2>
<div class="space-y-4">
<input type="email" id="login-email" placeholder="E-mail" class="w-full p-3 rounded-xl">
<input type="password" id="login-senha" placeholder="Senha" class="w-full p-3 rounded-xl">
<button onclick="fazerLogin()" class="w-full btn-primary p-3 rounded-xl">Entrar</button>
</div>
</div>

<div id="secao-admin-painel" class="glass p-6 rounded-2xl hidden">
<div class="flex justify-between items-center mb-6">
<h2 class="text-2xl font-bold">Novo Produto</h2>
<button onclick="fazerLogout()" class="bg-gray-700 px-4 py-2 rounded-xl">Sair</button>
</div>
<form id="form-produto" onsubmit="salvarProduto(event)" class="space-y-4">
<input type="text" id="prod-nome" placeholder="Nome" required class="w-full p-3 rounded-xl">
<textarea id="prod-descricao" placeholder="Descrição" rows="3" class="w-full p-3 rounded-xl"></textarea>
<div class="flex gap-2">
<input type="text" id="nova-categoria" placeholder="Nova categoria" class="flex-1 p-3 rounded-xl">
<button type="button" onclick="criarCategoria()" class="btn-primary px-4 rounded-xl">+</button>
</div>
<select id="prod-categoria" class="w-full p-3 rounded-xl">
<option value="hamburguer">Hambúrguer</option>
<option value="bebida">Bebida</option>
<option value="combo">Combo</option>
<option value="porcao">Porção</option>
</select>
<input type="number" step="0.01" id="prod-preco" placeholder="Preço" required class="w-full p-3 rounded-xl">
<input type="file" id="prod-imagem" accept="image/*" required class="w-full p-3 rounded-xl">
<button type="submit" class="w-full btn-primary p-4 rounded-xl text-lg">Cadastrar Produto</button>
</form>
<div class="mt-10 border-t border-gray-700 pt-6">
<h2 class="text-2xl font-bold mb-4">Produtos Cadastrados</h2>
<div id="lista-admin-produtos" class="space-y-4"></div>
</div>
</div>
</div>
</main>

<div id="sidebar-carrinho" class="fixed inset-y-0 right-0 w-full max-w-md shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
<div class="p-4 flex justify-between items-center border-b border-gray-700">
<h3 class="text-lg font-bold">Seu Pedido</h3>
<button onclick="toggleCarrinho()" class="text-2xl font-bold">×</button>
</div>
<div id="itens-carrinho" class="p-4 flex-grow overflow-y-auto space-y-4"><p class="text-center text-gray-500">Carrinho vazio</p></div>
<div class="p-4 border-t border-gray-700 space-y-3">
<div class="flex justify-between font-bold text-lg"><span>Total:</span><span id="total-carrinho">R$ 0,00</span></div>
<input type="text" id="cliente-nome" placeholder="Seu nome" class="w-full p-3 rounded-xl">
<input type="text" id="cliente-telefone" placeholder="Seu telefone" class="w-full p-3 rounded-xl">
<div class="flex gap-2">
<button type="button" id="btn-entrega" onclick="selecionarTipoPedido('entrega')" class="flex-1 btn-primary py-3 rounded-xl">🚚 Entrega</button>
<button type="button" id="btn-retirada" onclick="selecionarTipoPedido('retirada')" class="flex-1 bg-gray-700 py-3 rounded-xl">🛍️ Retirada</button>
</div>
<div id="box-endereco"><input type="text" id="cliente-endereco" placeholder="Seu endereço" class="w-full p-3 rounded-xl"></div>
<div id="info-vip" class="hidden bg-green-500/20 text-green-400 p-3 rounded-xl text-sm"></div>
<button onclick="enviarWhatsApp()" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-xl font-bold text-lg"><i class="fab fa-whatsapp"></i> Enviar Pedido</button>
</div>
</div>

<script src="assets/js/config.js" defer></script>
<script src="assets/js/state.js" defer></script>
<script src="assets/js/utils.js" defer></script>
<script src="assets/js/supabase-service.js" defer></script>
<script src="assets/js/catalogo.js" defer></script>
<script src="assets/js/admin.js" defer></script>
<script src="assets/js/carrinho.js" defer></script>
<script src="assets/js/app.js" defer></script>
</body>
</html>
