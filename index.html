<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Du Lanche - Painel Administrativo Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white p-4">

    <div class="max-w-2xl mx-auto bg-gray-800 p-6 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-black text-amber-500 mb-6 text-center">Painel de Gestão Du Lanche</h1>

        <section class="mb-8 border-b border-gray-700 pb-4">
            <h2 class="font-bold mb-2"><i class="fas fa-image"></i> Imagem de Fundo</h2>
            <input type="file" class="w-full text-sm mb-2">
            <button class="bg-gray-700 w-full p-2 rounded text-sm">Atualizar Papel de Parede</button>
        </section>

        <section class="mb-8 border-b border-gray-700 pb-4">
            <h2 class="font-bold mb-2"><i class="fas fa-burger"></i> Adicionar ao Cardápio</h2>
            <input type="file" class="w-full mb-2">
            <input type="text" placeholder="Nome do lanche" class="w-full p-2 mb-2 rounded text-black">
            <textarea placeholder="Descrição/Ingredientes" class="w-full p-2 mb-2 rounded text-black"></textarea>
            <input type="number" placeholder="Preço (Ex. 25.00)" class="w-full p-2 mb-2 rounded text-black">
            <button class="bg-blue-600 w-full p-2 rounded font-bold">Cadastrar Produto</button>
        </section>

        <section class="mb-8 border-b border-gray-700 pb-4">
            <h2 class="font-bold mb-2"><i class="fas fa-tags"></i> Criar/Gerenciar Categorias</h2>
            <div id="lista-admin" class="space-y-2">
                </div>
        </section>

        <section>
            <h2 class="font-bold mb-2"><i class="fas fa-ticket"></i> Criar Cupom</h2>
            <input type="text" placeholder="CÓDIGO (Ex: Du10)" class="w-full p-2 mb-2 rounded text-black">
            <input type="number" placeholder="Valor Desconto (R$)" class="w-full p-2 mb-2 rounded text-black">
            <input type="number" placeholder="Qtd máxima de usos" class="w-full p-2 mb-2 rounded text-black">
            <button class="bg-green-600 w-full p-2 rounded font-bold">Salvar Cupom</button>
        </section>

        <button class="mt-8 w-full text-red-500 underline text-sm">Sair do Painel</button>
    </div>

    <script>
        // Lógica de integração Supabase (resumida para estrutura)
        const _s = supabase.createClient("URL", "KEY");
        const cats = ['Hamburguer', 'Batata', 'Caldos', 'Porcoes', 'Bebidas', 'Cachorro Quente', 'Combos'];

        // Função de Realocação de Categoria (A que você precisava)
        async function carregarPainelAdmin() {
            const { data } = await _s.from('produtos').select('*');
            const cont = document.getElementById('lista-admin');
            cont.innerHTML = data.map(p => `
                <div class="flex justify-between items-center bg-gray-700 p-2 rounded text-xs">
                    <span>${p.nome}</span>
                    <select onchange="realocar('${p.id}', this.value)" class="bg-black p-1 rounded">
                        ${cats.map(c => `<option value="${c}" ${p.categoria === c ? 'selected' : ''}>${c}</option>`).join('')}
                    </select>
                </div>
            `).join('');
        }

        async function realocar(id, cat) {
            await _s.from('produtos').update({ categoria: cat }).eq('id', id);
            alert("Categoria atualizada!");
        }

        window.onload = carregarPainelAdmin;
    </script>
</body>
</html>
