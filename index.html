<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDV Corrigido</title>

<link rel="icon" href="data:,">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#111;
    color:#fff;
    font-family:Arial;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:180px;
    background:#000;
    color:#fff;
    border:1px solid #333;
    padding:10px;
    border-radius:10px;
}

button{
    background:#ff9800;
    border:none;
    color:#fff;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

.lista{
    margin-top:20px;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:12px;
    border-bottom:1px solid #333;
}

.total{
    font-size:22px;
    margin-top:20px;
    font-weight:bold;
    color:#4caf50;
}

.erro{
    color:#ff5252;
    margin-top:10px;
}

.ok{
    color:#4caf50;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

    <div class="card">
        <h1 style="font-size:28px;">PDV - IMPORTAR CARDÁPIO</h1>

        <p>
            Formato:
        </p>

<pre>
HAMBÚRGUER 15.00
X-BURGUER 18.00
COCA COLA 6.00
</pre>

        <textarea id="entrada"></textarea>

        <button onclick="processarCardapio()">
            IMPORTAR CARDÁPIO
        </button>

        <div id="status"></div>
    </div>

    <div class="card">
        <h2>PRODUTOS</h2>

        <div id="lista" class="lista"></div>

        <div id="total" class="total">
            TOTAL: R$ 0.00
        </div>
    </div>

</div>

<script>

/* =========================================
   LIMPA TOKENS CORROMPIDOS
========================================= */

try{

    const versao = localStorage.getItem("versao_app");

    if(versao !== "1.0"){

        localStorage.clear();
        sessionStorage.clear();

        localStorage.setItem("versao_app","1.0");
    }

}catch(e){
    console.log(e);
}

/* =========================================
   LIMPAR TEXTO
========================================= */

function limparTextoSeguro(texto){

    return texto
        .replace(/[“”]/g,'"')
        .replace(/[‘’]/g,"'")
        .replace(/[\u200B-\u200D\uFEFF]/g,'')
        .replace(/\t/g,' ')
        .replace(/\r/g,'')
        .trim();
}

/* =========================================
   IMPORTAÇÃO SEGURA
========================================= */

function importarCardapio(texto){

    try{

        const linhas = texto
            .split('\n')
            .map(l => l.trim())
            .filter(l => l !== '');

        const produtos = [];

        linhas.forEach((linha)=>{

            linha = linha.replace(/[^\x20-\x7EÀ-ÿ]/g,'');

            const match = linha.match(/^(.*?)\s+(\d+[.,]?\d*)$/);

            if(!match){
                console.log("Linha ignorada:", linha);
                return;
            }

            const nome = match[1]
                .trim()
                .replace(/\s+/g,' ');

            const preco = parseFloat(
                match[2].replace(',','.')
            );

            if(isNaN(preco)) return;

            produtos.push({
                nome,
                preco
            });

        });

        return produtos;

    }catch(err){

        console.error(err);

        return [];
    }
}

/* =========================================
   SALVAR
========================================= */

function salvarCardapio(produtos){

    try{

        localStorage.setItem(
            "cardapio",
            JSON.stringify(produtos)
        );

        return true;

    }catch(err){

        console.error(err);

        return false;
    }
}

/* =========================================
   CARREGAR
========================================= */

function carregarCardapio(){

    try{

        const dados = localStorage.getItem("cardapio");

        if(!dados) return [];

        return JSON.parse(dados);

    }catch(err){

        console.error(err);

        localStorage.removeItem("cardapio");

        return [];
    }
}

/* =========================================
   RENDER
========================================= */

function renderizarProdutos(){

    const produtos = carregarCardapio();

    const lista = document.getElementById("lista");

    lista.innerHTML = "";

    let total = 0;

    produtos.forEach((produto,index)=>{

        total += produto.preco;

        lista.innerHTML += `
            <div class="item">
                <div>
                    ${produto.nome}
                </div>

                <div>
                    R$ ${produto.preco.toFixed(2)}
                </div>
            </div>
        `;
    });

    document.getElementById("total").innerHTML =
        `TOTAL: R$ ${total.toFixed(2)}`;
}

/* =========================================
   PROCESSAR
========================================= */

function processarCardapio(){

    try{

        const entrada = document.getElementById("entrada");

        const texto = limparTextoSeguro(
            entrada.value
        );

        const produtos = importarCardapio(texto);

        if(produtos.length === 0){

            document.getElementById("status").innerHTML =
                `<div class="erro">
                    Nenhum produto encontrado.
                </div>`;

            return;
        }

        salvarCardapio(produtos);

        renderizarProdutos();

        document.getElementById("status").innerHTML =
            `<div class="ok">
                ${produtos.length} produtos importados com sucesso.
            </div>`;

    }catch(err){

        console.error(err);

        document.getElementById("status").innerHTML =
            `<div class="erro">
                Erro ao importar cardápio.
            </div>`;
    }
}

/* =========================================
   INICIAR
========================================= */

renderizarProdutos();

</script>

</body>
</html>
