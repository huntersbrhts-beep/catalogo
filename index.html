<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Du Lanche - Sistema Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <header class="p-4 bg-slate-900 border-b border-white/10 flex justify-between">
        <h1 class="font-black text-amber-500 cursor-pointer" onclick="mudarAba('catalogo')">Du LANCHE</h1>
        <div>
            <button onclick="mudarAba('carrinho')" class="mr-4"><i class="fas fa-shopping-cart"></i></button>
            <button onclick="mudarAba('admin')"><i class="fas fa-cog"></i></button>
        </div>
    </header>

    <main class="container mx-auto p-4">
        <div id="aba-catalogo" class="tab-content active">
            <div id="grid-produtos" class="grid grid-cols-2 gap-4"></div>
        </div>

        <div id="aba-carrinho" class="tab-content">
            <h2 class="font-bold text-lg mb-4">Seu Pedido</h2>
            <div id="lista-carrinho"></div>
        </div>

        <div id="aba-admin" class="tab-content bg-slate-900 p-6 rounded-2xl">
            <h2 class="font-bold mb-4">Gerenciamento</h2>
            <div id="secao-login" class="space-y-2">
                <input type="email" id="login-email" placeholder="Email" class="w-full p-2 text-black rounded">
                <input type="password" id="login-senha" placeholder="Senha" class="w-full p-2 text-black rounded">
                <button onclick="fazerLogin()" class="w-full bg-blue-600 p-2 rounded font-bold">Entrar</button>
            </div>
            <div id="secao-painel" class="hidden space-y-4">
                <div id="lista-admin" class="space-y-2"></div>
                <button onclick="fazerLogout()" class="text-red-500 underline text-xs">Sair</button>
            </div>
        </div>
    </main>

    <script>
        const _s = supabase.createClient("https://yawousokoaqeyvktjosj.supabase.co", "sb_publishable__TXuxjZ8PObBZxsM-PjF1Q_fAvPsDa3");
        let lista = [];

        async function carregar() {
            const { data } = await _s.from('produtos').select('*');
            lista = data || [];
            renderizar();
        }

        function renderizar() {
            document.getElementById('grid-produtos').innerHTML = lista.map(p => `
                <div class="bg-slate-800 p-3 rounded-lg">
                    <img src="${p.imagem_url}" class="h-24 w-full object-cover rounded">
                    <p class="font-bold text-xs mt-2">${p.nome}</p>
                    <button onclick="adicionarCarrinho('${p.id}')" class="bg-amber-500 w-full py-1 mt-2 rounded text-xs font-bold">Adicionar</button>
                </div>
            `).join('');
        }

        function renderizarAdmin() {
            const cont = document.getElementById('lista-admin');
            cont.innerHTML = lista.map(p => `
                <div class="flex justify-between items-center bg-slate-800 p-2 rounded text-[10px]">
                    <span>${p.nome}</span>
                    <select onchange="realocar('${p.id}', this.value)" class="bg-black text-white p-1 rounded">
                        ${['Hamburguer','Batata','Caldos','Porcoes','Bebidas'].map(c => `<option value="${c}" ${p.categoria === c ? 'selected' : ''}>${c}</option>`).join('')}
                    </select>
                    <button onclick="apagar('${p.id}')" class="text-red-500"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        async function realocar(id, cat) {
            await _s.from('produtos').update({ categoria: cat }).eq('id', id);
            carregar();
        }

        async function apagar(id) {
            await _s.from('produtos').delete().eq('id', id);
            carregar();
            renderizarAdmin();
        }

        function mudarAba(aba) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('aba-' + aba).classList.add('active');
        }

        async function fazerLogin() {
            const { error } = await _s.auth.signInWithPassword({ email: document.getElementById('login-email').value, password: document.getElementById('login-senha').value });
            if (!error) {
                document.getElementById('secao-login').classList.add('hidden');
                document.getElementById('secao-painel').classList.remove('hidden');
                renderizarAdmin();
            }
        }

        function fazerLogout() { _s.auth.signOut(); location.reload(); }
        window.onload = carregar;
    </script>
</body>
</html>
