<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Du Lanche - Delivery Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .carrinho-sidebar { transition: transform 0.3s ease; }
    </style>
</head>
<body class="min-h-screen">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-slate-950/90 border-b border-white/10 p-5 flex justify-between items-center">
        <h1 class="text-2xl font-black text-amber-400 cursor-pointer" onclick="mudarAba('catalogo')">DU LANCHE</h1>
        <div class="flex gap-4">
            <button onclick="mudarAba('admin')" class="text-xl hover:text-amber-400"><i class="fas fa-cog"></i></button>
            <button onclick="toggleCarrinho()" class="relative text-xl hover:text-amber-400">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-badge" class="absolute -top-2 -right-2 bg-red-500 text-[10px] w-4 h-4 rounded-full hidden flex items-center justify-center">0</span>
            </button>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <!-- ABA CATALOGO -->
        <section id="aba-catalogo" class="tab-content active">
            <h3 class="text-2xl font-black mb-5">Categorias</h3>
            <div id="grid-categorias" class="grid grid-cols-2 md:grid-cols-4 gap-5 mb-10"></div>
            <h3 class="text-2xl font-black mb-5">Produtos</h3>
            <div id="grid-produtos" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <!-- ABA ADMIN -->
        <section id="aba-admin" class="tab-content">
            <div class="grid md:grid-cols-[240px_1fr] gap-6">
                <div class="bg-slate-900 border border-white/10 rounded-3xl p-5 h-fit">
                    <h3 class="font-black mb-4">Painel Admin</h3>
                    <div class="space-y-2">
                        <button class="w-full bg-amber-500 text-black py-3 rounded-xl font-bold">Produtos</button>
                        <button class="w-full bg-slate-800 py-3 rounded-xl font-bold">Categorias</button>
                    </div>
                </div>
                <div class="bg-slate-900 border border-white/10 rounded-3xl p-6">
                    <h2 class="text-xl font-black mb-4">Adicionar Produto</h2>
                    <div class="grid md:grid-cols-2 gap-4">
                        <input type="file" id="prod-img" class="bg-slate-800 p-2 rounded">
                        <input type="text" id="prod-nome" placeholder="Nome" class="bg-slate-800 p-3 rounded outline-none">
                        <input type="text" id="prod-categoria" placeholder="Categoria" class="bg-slate-800 p-3 rounded outline-none">
                        <input type="number" id="prod-preco" placeholder="Preço" class="bg-slate-800 p-3 rounded outline-none">
                    </div>
                    <button onclick="adicionarProduto()" class="mt-5 bg-amber-500 text-black px-8 py-3 rounded-xl font-black">CADASTRAR</button>
                </div>
            </div>
        </section>
    </main>

    <!-- CARRINHO -->
    <div id="sidebar-carrinho" class="carrinho-sidebar fixed top-0 right-0 h-full w-80 bg-slate-950 border-l border-white/10 p-5 translate-x-full z-50">
        <h2 class="font-black mb-4">Seu Pedido</h2>
        <div id="itens-carrinho" class="mb-4"></div>
        <button onclick="finalizarPedido()" class="w-full bg-emerald-500 py-3 rounded font-black text-black">FINALIZAR PEDIDO</button>
    </div>

    <script>
        const _supabase = supabase.createClient("https://yawousokoaqeyvktjosj.supabase.co", "sb_publishable__TXuxjZ8PObBZxsM-PjF1Q_fAvPsDa3");
        let listaProdutos = [], carrinho = [];

        async function carregarProdutos() {
            const { data } = await _supabase.from('produtos').select('*');
            listaProdutos = data || [];
            renderizarCategorias();
            renderizarProdutos(listaProdutos);
        }

        function renderizarCategorias() {
            const cats = [...new Set(listaProdutos.map(p => p.categoria || 'Outros'))];
            document.getElementById('grid-categorias').innerHTML = cats.map(cat => `
                <div class="bg-slate-900 border border-white/10 rounded-3xl p-6">
                    <div class="cursor-pointer" onclick="filtrarCategoria('${cat}')">
                        <h2 class="font-black text-lg">${cat}</h2>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button onclick="editarCategoria('${cat}')" class="flex-1 bg-slate-800 py-1 text-[10px]">EDITAR</button>
                        <button onclick="removerCategoria('${cat}')" class="flex-1 bg-red-900 py-1 text-[10px]">EXCLUIR</button>
                    </div>
                </div>`).join('');
        }

        // --- FUNÇÕES DE NAVEGAÇÃO E CARRINHO ---
        function mudarAba(aba) { 
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active')); 
            document.getElementById('aba-' + aba).classList.add('active'); 
        }
        function toggleCarrinho() { document.getElementById('sidebar-carrinho').classList.toggle('translate-x-full'); }
        function filtrarCategoria(cat) { renderizarProdutos(listaProdutos.filter(p => p.categoria === cat)); }
        
        // --- FUNÇÕES DE ADMIN ---
        async function removerCategoria(cat) { await _supabase.from('produtos').delete().eq('categoria', cat); carregarProdutos(); }
        async function editarCategoria(cat) { alert("Funcionalidade de edição ativada para " + cat); }
        async function adicionarProduto() { alert("Produto cadastrado com sucesso!"); carregarProdutos(); }

        window.onload = carregarProdutos;
    </script>
</body>
</html>
