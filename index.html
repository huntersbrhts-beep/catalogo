<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

    <title>Du Lanche - Sistema Profissional</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        body {
            background: #020617;
            color: white;
            overflow-x: hidden;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .admin-section {
            display: none;
        }

        .admin-section.active {
            display: block;
        }

        .zoom-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .zoom-modal.active {
            display: flex;
        }

        .categoria-card:hover {
            transform: translateY(-5px);
        }

        .categoria-card {
            transition: .3s;
        }

        .produto-card {
            transition: .3s;
        }

        .produto-card:hover {
            transform: translateY(-5px);
        }
    </style>

</head>

<body class="min-h-screen flex flex-col">

    <!-- HEADER -->

    <header
        class="sticky top-0 z-50 bg-slate-950/90 border-b border-white/10 backdrop-blur-xl">

        <div
            class="container mx-auto px-5 py-4 flex items-center justify-between">

            <h1
                onclick="mudarAba('catalogo')"
                class="text-3xl font-black text-amber-400 cursor-pointer">

                DU LANCHE

            </h1>

            <div class="flex gap-5 items-center">

                <button
                    onclick="mudarAba('admin')"
                    class="text-xl hover:text-amber-400">

                    <i class="fas fa-cog"></i>

                </button>

                <button
                    onclick="toggleCarrinho()"
                    class="relative text-2xl hover:text-amber-400">

                    <i class="fas fa-shopping-cart"></i>

                    <span
                        id="cart-badge"
                        class="hidden absolute -top-2 -right-2 bg-red-500 w-5 h-5 rounded-full text-[10px] flex items-center justify-center font-bold">

                        0

                    </span>

                </button>

            </div>

        </div>

    </header>

    <!-- MAIN -->

    <main
        class="container mx-auto px-4 py-6 flex-grow">

        <!-- HOME -->

        <section
            id="aba-catalogo"
            class="tab-content active">

            <!-- HERO -->

            <div
                class="rounded-[40px] overflow-hidden bg-gradient-to-r from-amber-500 to-orange-600 p-10 mb-10">

                <h2
                    class="text-5xl font-black mb-4">

                    Delivery Premium

                </h2>

                <p
                    class="text-white/80 mb-8">

                    Escolha sua categoria favorita.

                </p>

                <button
                    onclick="scrollCategorias()"
                    class="bg-black hover:bg-slate-900 transition px-8 py-4 rounded-2xl font-black">

                    VER CARDÁPIO

                </button>

            </div>

            <!-- CATEGORIAS -->

            <div
                id="categorias"
                class="mb-10">

                <div
                    class="flex items-center justify-between mb-6">

                    <h2
                        class="text-3xl font-black">

                        Categorias

                    </h2>

                    <button
                        onclick="mostrarTodosProdutos()"
                        class="text-amber-400">

                        Ver todos

                    </button>

                </div>

                <div
                    id="grid-categorias"
                    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">

                </div>

            </div>

            <!-- PRODUTOS -->

            <div>

                <h2
                    id="titulo-produtos"
                    class="text-3xl font-black mb-6">

                    Todos os Produtos

                </h2>

                <div
                    id="grid-produtos"
                    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">

                </div>

            </div>

        </section>

        <!-- ADMIN -->

        <section
            id="aba-admin"
            class="tab-content">

            <!-- LOGIN -->

            <div
                id="secao-login-admin"
                class="max-w-md mx-auto">

                <div
                    class="bg-slate-900 border border-white/10 rounded-3xl p-8">

                    <h2
                        class="text-3xl font-black mb-5">

                        Login Admin

                    </h2>

                    <div class="space-y-4">

                        <input
                            id="login-email"
                            type="email"
                            placeholder="Email"
                            class="w-full bg-slate-800 rounded-xl p-4 outline-none">

                        <input
                            id="login-senha"
                            type="password"
                            placeholder="Senha"
                            class="w-full bg-slate-800 rounded-xl p-4 outline-none">

                        <button
                            onclick="fazerLogin()"
                            class="w-full bg-amber-500 hover:bg-amber-400 transition text-black py-4 rounded-xl font-black">

                            ENTRAR

                        </button>

                    </div>

                </div>

            </div>

            <!-- PAINEL -->

            <div
                id="painel-admin"
                class="hidden grid md:grid-cols-[260px_1fr] gap-6">

                <!-- MENU -->

                <div
                    class="bg-slate-900 border border-white/10 rounded-3xl p-5 h-fit sticky top-24">

                    <div
                        class="flex items-center justify-between mb-8">

                        <h2
                            class="text-2xl font-black">

                            Painel

                        </h2>

                        <button
                            onclick="logout()"
                            class="text-red-400">

                            <i class="fas fa-sign-out-alt"></i>

                        </button>

                    </div>

                    <div class="space-y-3">

                        <button
                            onclick="abrirSecaoAdmin('dashboard')"
                            class="w-full bg-amber-500 text-black py-3 rounded-xl font-black">

                            Dashboard

                        </button>

                        <button
                            onclick="abrirSecaoAdmin('produtos')"
                            class="w-full bg-slate-800 py-3 rounded-xl font-bold">

                            Produtos

                        </button>

                        <button
                            onclick="abrirSecaoAdmin('categorias')"
                            class="w-full bg-slate-800 py-3 rounded-xl font-bold">

                            Categorias

                        </button>

                        <button
                            onclick="abrirSecaoAdmin('cupons')"
                            class="w-full bg-slate-800 py-3 rounded-xl font-bold">

                            Cupons

                        </button>

                        <button
                            onclick="abrirSecaoAdmin('aparencia')"
                            class="w-full bg-slate-800 py-3 rounded-xl font-bold">

                            Aparência

                        </button>

                    </div>

                </div>

                <!-- CONTEUDO -->

                <div>

                    <!-- DASHBOARD -->

                    <div
                        id="secao-dashboard"
                        class="admin-section active">

                        <div
                            class="grid md:grid-cols-4 gap-5">

                            <div
                                class="bg-slate-900 border border-white/10 rounded-3xl p-6">

                                <p
                                    class="text-white/50 mb-2">

                                    Produtos

                                </p>

                                <h2
                                    id="total-produtos"
                                    class="text-4xl font-black text-amber-400">

                                    0

                                </h2>

                            </div>

                            <div
                                class="bg-slate-900 border border-white/10 rounded-3xl p-6">

                                <p
                                    class="text-white/50 mb-2">

                                    Categorias

                                </p>

                                <h2
                                    id="total-categorias"
                                    class="text-4xl font-black text-emerald-400">

                                    0

                                </h2>

                            </div>

                            <div
                                class="bg-slate-900 border border-white/10 rounded-3xl p-6">

                                <p
                                    class="text-white/50 mb-2">

                                    Cupons

                                </p>

                                <h2
                                    id="total-cupons"
                                    class="text-4xl font-black text-blue-400">

                                    0

                                </h2>

                            </div>

                        </div>

                    </div>

                    <!-- PRODUTOS -->

                    <div
                        id="secao-produtos"
                        class="admin-section">

                        <div
                            class="bg-slate-900 border border-white/10 rounded-3xl p-6 mb-6">

                            <h2
                                class="text-3xl font-black mb-6">

                                Adicionar Produto

                            </h2>

                            <div
                                class="grid md:grid-cols-2 gap-4">

                                <input
                                    id="prod-img"
                                    type="file"
                                    class="bg-slate-800 rounded-xl p-4">

                                <input
                                    id="prod-nome"
                                    type="text"
                                    placeholder="Nome produto"
                                    class="bg-slate-800 rounded-xl p-4 outline-none">

                                <input
                                    id="prod-categoria"
                                    type="text"
                                    placeholder="Categoria"
                                    class="bg-slate-800 rounded-xl p-4 outline-none">

                                <input
                                    id="prod-preco"
                                    type="number"
                                    placeholder="Preço"
                                    class="bg-slate-800 rounded-xl p-4 outline-none">

                            </div>

                            <textarea
                                id="prod-desc"
                                placeholder="Descrição"
                                class="w-full h-32 bg-slate-800 rounded-xl p-4 outline-none mt-4"></textarea>

                            <button
                                onclick="adicionarProduto()"
                                class="mt-5 bg-amber-500 hover:bg-amber-400 transition text-black px-8 py-4 rounded-xl font-black">

                                CADASTRAR

                            </button>

                        </div>

                        <div
                            id="lista-admin-produtos"
                            class="space-y-4">

                        </div>

                    </div>

                    <!-- CATEGORIAS -->

                    <div
                        id="secao-categorias"
                        class="admin-section">

                        <div
                            class="bg-slate-900 border border-white/10 rounded-3xl p-6">

                            <h2
                                class="text-3xl font-black mb-6">

                                Categorias

                            </h2>

                            <div
                                class="grid md:grid-cols-3 gap-4 mb-6">

                                <input
                                    id="categoria-nome"
                                    type="text"
                                    placeholder="Nome categoria"
                                    class="bg-slate-800 rounded-xl p-4">

                                <input
                                    id="categoria-icone"
                                    type="text"
                                    placeholder="Emoji"
                                    class="bg-slate-800 rounded-xl p-4">

                                <button
                                    onclick="criarCategoria()"
                                    class="bg-amber-500 text-black rounded-xl font-black">

                                    CRIAR

                                </button>

                            </div>

                            <div
                                id="lista-categorias"
                                class="space-y-4">

                            </div>

                        </div>

                    </div>

                    <!-- CUPONS -->

                    <div
                        id="secao-cupons"
                        class="admin-section">

                        <div
                            class="bg-slate-900 border border-white/10 rounded-3xl p-6">

                            <h2
                                class="text-3xl font-black mb-6">

                                Cupons

                            </h2>

                            <div
                                class="grid md:grid-cols-4 gap-4 mb-6">

                                <input
                                    id="cupom-codigo"
                                    type="text"
                                    placeholder="Cupom"
                                    class="bg-slate-800 rounded-xl p-4">

                                <input
                                    id="cupom-desconto"
                                    type="number"
                                    placeholder="%"
                                    class="bg-slate-800 rounded-xl p-4">

                                <input
                                    id="cupom-minimo"
                                    type="number"
                                    placeholder="Mínimo"
                                    class="bg-slate-800 rounded-xl p-4">

                                <button
                                    onclick="criarCupom()"
                                    class="bg-amber-500 text-black rounded-xl font-black">

                                    CRIAR

                                </button>

                            </div>

                            <div
                                id="lista-cupons"
                                class="space-y-4">

                            </div>

                        </div>

                    </div>

                    <!-- APARENCIA -->

                    <div
                        id="secao-aparencia"
                        class="admin-section">

                        <div
                            class="bg-slate-900 border border-white/10 rounded-3xl p-6">

                            <h2
                                class="text-3xl font-black mb-6">

                                Aparência

                            </h2>

                            <div
                                class="grid md:grid-cols-2 gap-4">

                                <input
                                    id="whatsapp-loja"
                                    type="text"
                                    placeholder="WhatsApp"
                                    class="bg-slate-800 rounded-xl p-4">

                                <input
                                    id="instagram-loja"
                                    type="text"
                                    placeholder="Instagram"
                                    class="bg-slate-800 rounded-xl p-4">

                            </div>

                            <button
                                onclick="salvarAparencia()"
                                class="mt-5 bg-amber-500 hover:bg-amber-400 transition text-black px-8 py-4 rounded-xl font-black">

                                SALVAR

                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <!-- CARRINHO -->

    <div
        id="sidebar-carrinho"
        class="fixed top-0 right-0 w-full md:w-[420px] h-full bg-slate-950 border-l border-white/10 z-50 translate-x-full transition-transform duration-300 flex flex-col">

        <div
            class="p-5 border-b border-white/10 flex items-center justify-between">

            <h2
                class="text-2xl font-black">

                Seu Pedido

            </h2>

            <button
                onclick="toggleCarrinho()">

                <i class="fas fa-times"></i>

            </button>

        </div>

        <div
            id="itens-carrinho"
            class="flex-grow overflow-y-auto p-5 space-y-4">

        </div>

    </div>

    <!-- ZOOM -->

    <div
        id="zoom-modal"
        class="zoom-modal"
        onclick="fecharZoom()">

        <img
            id="img-zoom"
            class="max-w-[90%] max-h-[90vh] rounded-3xl">

    </div>

    <!-- SCRIPT -->

    <script>

        const _supabase = supabase.createClient(
            "SUA_URL_SUPABASE",
            "SUA_ANON_KEY"
        );

        let listaProdutos = [];

        let carrinho = [];

        // =====================================
        // START
        // =====================================

        window.onload = async () => {

            carregarProdutos();

            verificarSessao();

        };

        // =====================================
        // AUTH
        // =====================================

        async function verificarSessao() {

            const {
                data: { session }
            } = await _supabase.auth.getSession();

            if (session) {

                mostrarPainel();

            }

        }

        async function fazerLogin() {

            const email =
                document.getElementById('login-email').value;

            const senha =
                document.getElementById('login-senha').value;

            const { error } =
                await _supabase.auth.signInWithPassword({

                    email,
                    password: senha

                });

            if (error) {

                alert('Erro login');
                return;

            }

            mostrarPainel();

        }

        async function logout() {

            await _supabase.auth.signOut();

            location.reload();

        }

        function mostrarPainel() {

            document
                .getElementById('secao-login-admin')
                .classList.add('hidden');

            document
                .getElementById('painel-admin')
                .classList.remove('hidden');

            carregarProdutosAdmin();

            carregarCategorias();

            carregarCupons();

            carregarDashboard();

        }

        // =====================================
        // TABS
        // =====================================

        function mudarAba(aba) {

            document
                .querySelectorAll('.tab-content')
                .forEach(el =>
                    el.classList.remove('active')
                );

            document
                .getElementById('aba-' + aba)
                .classList.add('active');

        }

        function abrirSecaoAdmin(secao) {

            document
                .querySelectorAll('.admin-section')
                .forEach(el =>
                    el.classList.remove('active')
                );

            document
                .getElementById('secao-' + secao)
                .classList.add('active');

        }

        // =====================================
        // PRODUTOS
        // =====================================

        async function carregarProdutos() {

            const { data } =
                await _supabase
                    .from('produtos')
                    .select('*')
                    .order('nome');

            listaProdutos = data || [];

            renderizarCategorias();

            mostrarTodosProdutos();

        }

        function renderizarCategorias() {

            const categorias =
                [...new Set(
                    listaProdutos.map(
                        p => p.categoria || 'Outros'
                    )
                )];

            document
                .getElementById('grid-categorias')
                .innerHTML = categorias.map(cat => `

                <div
                    onclick="filtrarCategoria('${cat}')"
                    class="categoria-card bg-slate-900 border border-white/10 rounded-3xl p-8 cursor-pointer">

                    <h2
                        class="text-3xl font-black mb-2">

                        ${cat}

                    </h2>

                    <p
                        class="text-white/50">

                        ${listaProdutos.filter(
                p => p.categoria === cat
            ).length} produtos

                    </p>

                </div>

                `).join('');

        }

        function mostrarTodosProdutos() {

            renderizarProdutos(listaProdutos);

        }

        function filtrarCategoria(categoria) {

            const produtos =
                listaProdutos.filter(
                    p => p.categoria === categoria
                );

            renderizarProdutos(produtos);

        }

        function renderizarProdutos(produtos) {

            document
                .getElementById('grid-produtos')
                .innerHTML = produtos.map(produto => `

                <div
                    class="produto-card bg-slate-900 border border-white/10 rounded-3xl overflow-hidden">

                    <img
                        src="${produto.imagem_url}"
                        onclick="abrirZoom('${produto.imagem_url}')"
                        class="w-full h-64 object-cover cursor-pointer">

                    <div class="p-5">

                        <h2
                            class="text-2xl font-black mb-2">

                            ${produto.nome}

                        </h2>

                        <p
                            class="text-white/50 text-sm mb-5">

                            ${produto.descricao || ''}

                        </p>

                        <div
                            class="flex items-center justify-between">

                            <span
                                class="text-3xl font-black text-amber-400">

                                R$ ${Number(produto.preco).toFixed(2)}

                            </span>

                            <button
                                onclick="adicionarCarrinho('${produto.id}')"
                                class="bg-amber-500 hover:bg-amber-400 transition text-black px-5 py-3 rounded-xl font-black">

                                +

                            </button>

                        </div>

                    </div>

                </div>

                `).join('');

        }

    </script>

</body>

</html>
