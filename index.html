<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Du Lanche - Delivery Premium</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { scroll-behavior: smooth; }
        body { background: #020617; }
        .bg-fundo { position: fixed; inset: 0; z-index: -2; background-size: cover; background-position: center; background-repeat: no-repeat; opacity: 0.15; }
        .overlay { position: fixed; inset: 0; z-index: -1; background: linear-gradient(to bottom, rgba(2, 6, 23, 0.95), rgba(15, 23, 42, 0.96)); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .categoria-card:hover { transform: translateY(-5px); }
        .produto-card:hover { transform: translateY(-4px); }
        .zoom-modal { position: fixed; inset: 0; z-index: 100; display: none; background: rgba(0, 0, 0, 0.92); align-items: center; justify-content: center; }
        .zoom-modal.active { display: flex; }
        #itens-carrinho::-webkit-scrollbar { width: 4px; }
        #itens-carrinho::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 10px; }
    </style>
</head>

<body class="text-white min-h-screen flex flex-col">

    <div id="bg-dinamico" class="bg-fundo"></div>
    <div class="overlay"></div>

    <header class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-white/5 px-5 py-4 flex items-center justify-between">
        <div onclick="voltarHome()" class="cursor-pointer">
            <h1 class="text-2xl font-black text-amber-400 tracking-wide">DU LANCHE</h1>
        </div>
        <div class="flex items-center gap-5">
            <button onclick="mudarAba('admin')" class="text-xl hover:text-amber-400 transition"><i class="fas fa-cog"></i></button>
            <button onclick="toggleCarrinho()" class="relative text-2xl hover:text-amber-400 transition">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-badge" class="hidden absolute -top-2 -right-2 bg-red-500 w-5 h-5 rounded-full text-[10px] font-bold flex items-center justify-center">0</span>
            </button>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6 flex-grow">
        <section id="aba-catalogo" class="tab-content">
            <div class="bg-gradient-to-r from-amber-500 to-orange-600 rounded-[35px] p-8 md:p-12 mb-10 shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="uppercase text-sm font-bold tracking-[3px] text-white/80 mb-3">DELIVERY PREMIUM</p>
                    <h2 class="text-4xl md:text-6xl font-black leading-tight mb-4">O melhor lanche <br> da cidade</h2>
                    <button onclick="scrollCategorias()" class="bg-black text-white px-8 py-4 rounded-2xl font-bold hover:scale-105 transition">VER CARDÁPIO</button>
                </div>
            </div>
            <div id="categorias" class="mb-12">
                <h3 class="text-2xl font-black mb-5">Categorias</h3>
                <div id="grid-categorias" class="grid grid-cols-2 md:grid-cols-4 gap-5"></div>
            </div>
            <div>
                <div class="flex items-center justify-between mb-6">
                    <h3 id="titulo-produtos" class="text-2xl font-black">Produtos</h3>
                    <button onclick="mostrarTodosProdutos()" class="text-sm text-amber-400 hover:text-amber-300">Ver todos</button>
                </div>
                <div id="grid-produtos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </section>

        <section id="aba-admin" class="tab-content max-w-6xl mx-auto">
            <div class="grid md:grid-cols-[240px_1fr] gap-6">
                <div class="bg-slate-900 border border-white/10 rounded-3xl p-5 h-fit">
                    <h3 class="font-black text-lg mb-6">Painel Admin</h3>
                    <div class="space-y-2">
                        <button class="w-full bg-amber-500 text-black py-3 rounded-xl font-bold">Produtos</button>
                    </div>
                </div>
                <div class="bg-slate-900 border border-white/10 rounded-3xl p-6">
                    <h2 class="text-2xl font-black mb-6">Adicionar Produto</h2>
                    <div class="grid md:grid-cols-2 gap-4">
                        <input type="file" id="prod-img" class="bg-slate-800 rounded-xl p-3 text-sm">
                        <input type="text" id="prod-nome" placeholder="Nome do produto" class="bg-slate-800 rounded-xl p-4 outline-none">
                        <input type="text" id="prod-categoria" placeholder="Categoria" class="bg-slate-800 rounded-xl p-4 outline-none">
                        <input type="number" id="prod-preco" placeholder="Preço" class="bg-slate-800 rounded-xl p-4 outline-none">
                    </div>
                    <textarea id="prod-desc" placeholder="Descrição" class="bg-slate-800 rounded-xl p-4 outline-none w-full h-32 mt-4"></textarea>
                    <button onclick="adicionarProduto()" class="mt-5 bg-amber-500 hover:bg-amber-400 text-black font-black px-8 py-4 rounded-2xl transition">CADASTRAR PRODUTO</button>
                </div>
            </div>
        </section>
    </main>

    <div id="sidebar-carrinho" class="fixed top-0 right-0 h-full w-full md:w-[430px] bg-slate-950 z-50 translate-x-full transition-transform duration-300 flex flex-col border-l border-white/10">
        <div class="p-5 border-b border-white/10 flex justify-between items-center">
            <h2 class="font-black text-xl">Seu Pedido</h2>
            <button onclick="toggleCarrinho()" class="w-10 h-10 rounded-full bg-slate-800 hover:bg-slate-700"><i class="fas fa-times"></i></button>
        </div>
        <div id="itens-carrinho" class="flex-grow overflow-y-auto p-5 space-y-4"></div>
        <div class="p-5 border-t border-white/10">
            <input type="text" id="cliente-nome" placeholder="Seu nome" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 outline-none mb-3">
            <input type="text" id="cliente-endereco" placeholder="Endereço" class="w-full bg-slate-900 border border-white/10 rounded-xl p-4 outline-none mb-5">
            <div class="flex justify-between items-center mb-5">
                <span class="text-white/60">Total</span>
                <span id="total-carrinho" class="text-3xl font-black text-amber-400">R$ 0,00</span>
            </div>
            <button onclick="finalizarPedido()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black py-4 rounded-2xl transition">FINALIZAR PEDIDO</button>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient(
            "https://yawousokoaqeyvktjosj.supabase.co",
            "sb_publishable__TXuxjZ8PObBZxsM-PjF1Q_fAvPsDa3"
        );

        let listaProdutos = [];
        let carrinho = [];

        // ATUALIZAÇÃO INTEGRADA: Aba padrão definida aqui
        window.onload = async () => {
            mudarAba('catalogo'); 
            carregarProdutos();
            carregarFundo();
        };

        function mudarAba(aba) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('aba-' + aba).classList.add('active');
        }

        // ... (Mantém toda a sua lógica anterior de carregarProdutos, renderizar, etc.)
        async function carregarProdutos() {
            const { data } = await _supabase.from('produtos').select('*').order('nome');
            listaProdutos = data || [];
            if(window.renderizarCategorias) renderizarCategorias();
            if(window.mostrarTodosProdutos) mostrarTodosProdutos();
        }
        
        function voltarHome() { mudarAba('catalogo'); }
        function toggleCarrinho() { document.getElementById('sidebar-carrinho').classList.toggle('translate-x-full'); }
        // ... (resto das suas funções permanecem inalteradas)
    </script>
</body>
</html>
