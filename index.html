<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Du Lanche - Sistema de Gestão</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <header class="p-4 border-b border-white/10 flex justify-between items-center bg-slate-900">
        <h1 class="font-black text-amber-500 cursor-pointer text-xl" onclick="mudarAba('catalogo')">Du LANCHE</h1>
        <button onclick="mudarAba('admin')" class="bg-white/10 px-3 py-1 rounded">Admin</button>
    </header>

    <main class="container mx-auto p-4">
        <div id="aba-catalogo" class="tab-content active">
            <div class="flex overflow-x-auto gap-2 py-4 mb-4 scrollbar-hide">
                <button onclick="filtrar('Todos')" class="px-4 py-2 bg-amber-500 rounded-full font-bold text-xs whitespace-nowrap">Todos</button>
                <button onclick="filtrar('Hamburguer')" class="px-4 py-2 bg-slate-800 rounded-full font-bold text-xs whitespace-nowrap">Hamburguer</button>
                <button onclick="filtrar('Batata')" class="px-4 py-2 bg-slate-800 rounded-full font-bold text-xs whitespace-nowrap">Batata</button>
                <button onclick="filtrar('Caldos')" class="px-4 py-2 bg-slate-800 rounded-full font-bold text-xs whitespace-nowrap">Caldos</button>
                <button onclick="filtrar('Porcoes')" class="px-4 py-2 bg-slate-800 rounded-full font-bold text-xs whitespace-nowrap">Porções</button>
                <button onclick="filtrar('Bebidas')" class="px-4 py-2 bg-slate-800 rounded-full font-bold text-xs whitespace-nowrap">Bebidas</button>
                <button onclick="filtrar('Cachorro Quente')" class="px-4 py-2 bg-slate-800 rounded-full font-bold text-xs whitespace-nowrap">Cachorro Quente</button>
                <button onclick="filtrar('Combos')" class="px-4 py-2 bg-slate-800 rounded-full font-bold text-xs whitespace-nowrap">Combos</button>
            </div>
            <div id="grid-produtos" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>

        <div id="aba-admin" class="tab-content max-w-lg mx-auto bg-slate-900 p-6 rounded-3xl mt-4">
            <h2 class="font-black text-lg mb-4">Painel de Gerenciamento</h2>
            <div id="secao-login" class="space-y-2">
                <input type="email" id="login-email" placeholder="Email" class="w-full p-2 rounded text-black">
                <input type="password" id="login-senha" placeholder="Senha" class="w-full p-2 rounded text-black">
                <button onclick="fazerLogin()" class="w-full bg-amber-500 p-2 rounded font-bold">Entrar</button>
            </div>
            <div id="secao-admin-painel" class="hidden space-y-4">
                <h3 class="font-bold border-b border-white/10 pb-2">Realocar Produtos para Categorias</h3>
                <div id="lista-realocacao" class="max-h-60 overflow-y-auto space-y-2"></div>
                <button onclick="fazerLogout()" class="w-full text-red-400 text-xs underline mt-4">Sair do Painel</button>
            </div>
        </div>
    </main>

    <script>
        const _s = supabase.createClient("https://yawousokoaqeyvktjosj.supabase.co", "sb_publishable__TXuxjZ8PObBZxsM-PjF1Q_fAvPsDa3");
        let lista = [];
        const cats = ['Hamburguer', 'Batata', 'Caldos', 'Porcoes', 'Bebidas', 'Cachorro Quente', 'Combos'];

        async function carregar() {
            const { data } = await _s.from('produtos').select('*');
            lista = data || [];
            filtrar('Todos');
        }

        function filtrar(c) {
            const grid = document.getElementById('grid-produtos');
            const filtrados = c === 'Todos' ? lista : lista.filter(p => p.categoria === c);
            grid.innerHTML = filtrados.map(p => `
                <div class="bg-slate-800 p-3 rounded-xl border border-white/10">
                    <img src="${p.imagem_url}" class="h-24 w-full object-cover rounded-lg">
                    <p class="font-bold text-xs mt-2">${p.nome}</p>
                    <p class="text-amber-500 text-sm">R$ ${parseFloat(p.preco).toFixed(2)}</p>
                </div>
            `).join('');
        }

        function montarListaAdmin() {
            const cont = document.getElementById('lista-realocacao');
            cont.innerHTML = lista.map(p => `
                <div class="flex justify-between items-center bg-slate-800 p-2 rounded text-xs border border-white/10">
                    <span class="truncate w-1/3">${p.nome}</span>
                    <select onchange="realocar('${p.id}', this.value)" class="bg-black p-1 rounded text-white">
                        ${cats.map(c => `<option value="${c}" ${p.categoria === c ? 'selected' : ''}>${c}</option>`).join('')}
                    </select>
                </div>
            `).join('');
        }

        async function realocar(id, cat) {
            await _s.from('produtos').update({ categoria: cat }).eq('id', id);
            await carregar();
            montarListaAdmin();
        }

        async function fazerLogin() {
            const { error } = await _s.auth.signInWithPassword({ email: document.getElementById('login-email').value, password: document.getElementById('login-senha').value });
            if (!error) {
                document.getElementById('secao-login').classList.add('hidden');
                document.getElementById('secao-admin-painel').classList.remove('hidden');
                montarListaAdmin();
            } else alert("Erro no login");
        }

        function mudarAba(aba) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('aba-' + aba).classList.add('active');
        }

        function fazerLogout() { _s.auth.signOut(); location.reload(); }
        window.onload = carregar;
    </script>
</body>
</html>
