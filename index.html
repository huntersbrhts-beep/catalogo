<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Du Lanche - Delivery Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { scroll-behavior: smooth; }
        body { background: #020617; }
        .bg-fundo { position: fixed; inset: 0; z-index: -2; background-size: cover; background-position: center; background-repeat: no-repeat; opacity: 0.15; }
        .overlay { position: fixed; inset: 0; z-index: -1; background: linear-gradient(to bottom, rgba(2, 6, 23, 0.95), rgba(15, 23, 42, 0.96)); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .categoria-card:hover { transform: translateY(-5px); }
        .produto-card:hover { transform: translateY(-4px); }
        .zoom-modal { position: fixed; inset: 0; z-index: 100; display: none; background: rgba(0, 0, 0, 0.92); align-items: center; justify-content: center; }
        .zoom-modal.active { display: flex; }
        #itens-carrinho::-webkit-scrollbar { width: 4px; }
        #itens-carrinho::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 10px; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">
    <div id="bg-dinamico" class="bg-fundo"></div>
    <div class="overlay"></div>

    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-white/5 px-5 py-4 flex items-center justify-between">
        <div onclick="mudarAba('catalogo')" class="cursor-pointer">
            <h1 class="text-2xl font-black text-amber-400 tracking-wide">DU LANCHE</h1>
        </div>
        <div class="flex items-center gap-5">
            <button onclick="mudarAba('admin')" class="text-xl hover:text-amber-400 transition"><i class="fas fa-cog"></i></button>
            <button onclick="toggleCarrinho()" class="relative text-2xl hover:text-amber-400 transition">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-badge" class="hidden absolute -top-2 -right-2 bg-red-500 w-5 h-5 rounded-full text-[10px] font-bold flex items-center justify-center">0</span>
            </button>
        </div>
    </header>

    <!-- MAIN -->
    <main class="container mx-auto px-4 py-6 flex-grow">
        <!-- ABA CATALOGO -->
        <section id="aba-catalogo" class="tab-content active">
            <div id="categorias" class="mb-12">
                <h3 class="text-2xl font-black mb-5">Categorias</h3>
                <div id="grid-categorias" class="grid grid-cols-2 md:grid-cols-4 gap-5"></div>
            </div>
            <div>
                <h3 id="titulo-produtos" class="text-2xl font-black mb-6">Produtos</h3>
                <div id="grid-produtos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </section>

        <!-- ABA ADMIN -->
        <section id="aba-admin" class="tab-content max-w-6xl mx-auto">
            <div class="grid md:grid-cols-[240px_1fr] gap-6">
                <div class="bg-slate-900 border border-white/10 rounded-3xl p-5 h-fit">
                    <h3 class="font-black text-lg mb-6">Painel Admin</h3>
                    <div class="space-y-2">
                        <button class="w-full bg-amber-500 text-black py-3 rounded-xl font-bold">Produtos</button>
                    </div>
                </div>
                <div class="bg-slate-900 border border-white/10 rounded-3xl p-6">
                    <h2 class="text-2xl font-black mb-6">Adicionar Produto</h2>
                    <input type="file" id="prod-img" class="block w-full bg-slate-800 rounded-xl p-3 mb-4">
                    <input type="text" id="prod-nome" placeholder="Nome" class="w-full bg-slate-800 rounded-xl p-4 mb-4 outline-none">
                    <input type="text" id="prod-categoria" placeholder="Categoria" class="w-full bg-slate-800 rounded-xl p-4 mb-4 outline-none">
                    <input type="number" id="prod-preco" placeholder="Preço" class="w-full bg-slate-800 rounded-xl p-4 mb-4 outline-none">
                    <button onclick="adicionarProduto()" class="bg-amber-500 text-black font-black px-8 py-4 rounded-2xl">CADASTRAR</button>
                </div>
            </div>
        </section>
    </main>

    <!-- SIDEBAR CARRINHO (RESTAURADO) -->
    <div id="sidebar-carrinho" class="fixed top-0 right-0 h-full w-full md:w-[430px] bg-slate-950 z-50 translate-x-full transition-transform duration-300 flex flex-col border-l border-white/10">
        <div class="p-5 border-b border-white/10 flex justify-between items-center">
            <h2 class="font-black text-xl">Seu Pedido</h2>
            <button onclick="toggleCarrinho()" class="w-10 h-10 rounded-full bg-slate-800"><i class="fas fa-times"></i></button>
        </div>
        <div id="itens-carrinho" class="flex-grow overflow-y-auto p-5 space-y-4"></div>
        <div class="p-5 border-t border-white/10">
            <button onclick="finalizarPedido()" class="w-full bg-emerald-500 text-black font-black py-4 rounded-2xl">FINALIZAR PEDIDO</button>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://yawousokoaqeyvktjosj.supabase.co", "sb_publishable__TXuxjZ8PObBZxsM-PjF1Q_fAvPsDa3");
        let listaProdutos = [], carrinho = [];

        async function carregarProdutos() {
            const { data } = await _supabase.from('produtos').select('*');
            listaProdutos = data || [];
            renderizarCategorias();
            renderizarProdutos(listaProdutos);
        }

        function renderizarCategorias() {
            const cats = [...new Set(listaProdutos.map(p => p.categoria || 'Outros'))];
            document.getElementById('grid-categorias').innerHTML = cats.map(cat => `
                <div class="categoria-card bg-slate-900 border border-white/10 rounded-3xl p-6 shadow-xl">
                    <div class="cursor-pointer" onclick="filtrarCategoria('${cat}')">
                        <div class="text-4xl mb-4">🔥</div>
                        <h2 class="text-xl font-black capitalize">${cat}</h2>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button onclick="editarCategoria('${cat}')" class="flex-1 bg-slate-800 py-2 rounded-xl text-[10px] font-bold">EDITAR</button>
                        <button onclick="removerCategoria('${cat}')" class="flex-1 bg-red-900 text-red-400 py-2 rounded-xl text-[10px] font-bold">EXCLUIR</button>
                    </div>
                </div>`).join('');
        }

        // Funções de sistema restauradas
        function renderizarProdutos(prods) { /* Manter lógica original de exibição */ }
        function mudarAba(aba) { document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); document.getElementById('aba-' + aba).classList.add('active'); }
        function toggleCarrinho() { document.getElementById('sidebar-carrinho').classList.toggle('translate-x-full'); }
        async function removerCategoria(c) { await _supabase.from('produtos').delete().eq('categoria', c); carregarProdutos(); }
        async function adicionarProduto() { /* Lógica de insert original */ alert('Cadastrado!'); carregarProdutos(); }
        
        window.onload = carregarProdutos;
    </script>
</body>
</html>
