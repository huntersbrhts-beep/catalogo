<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Du Lanche - Delivery Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: white; }
        .tab-content, .admin-sub-tab { display: none; }
        .tab-content.active, .admin-sub-tab.active { display: block; }
        .zoom-modal { display: none; background: rgba(0,0,0,0.9); }
        .zoom-modal.active { display: flex; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="p-5 flex justify-between items-center border-b border-white/10">
        <h1 onclick="mudarAba('catalogo')" class="text-2xl font-black text-amber-400 cursor-pointer">DU LANCHE</h1>
        <button onclick="mudarAba('admin')" class="text-xl"><i class="fas fa-cog"></i></button>
    </header>

    <main class="container mx-auto p-4">
        
        <!-- ABA CATALOGO -->
        <section id="aba-catalogo" class="tab-content active">
            <div id="grid-produtos" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <!-- ABA ADMIN -->
        <section id="aba-admin" class="tab-content">
            <div class="grid md:grid-cols-[240px_1fr] gap-6">
                <div class="bg-slate-900 p-5 rounded-3xl h-fit">
                    <button onclick="mudarSubAba('produtos', this)" class="menu-btn w-full p-3 bg-amber-500 rounded-xl font-bold mb-2">Produtos</button>
                    <button onclick="executarLogout()" class="w-full p-3 bg-red-900 rounded-xl font-bold mt-4">Sair</button>
                </div>
                <div id="admin-content" class="bg-slate-900 p-6 rounded-3xl">
                    <!-- Gerenciamento -->
                    <div id="sub-produtos" class="admin-sub-tab active">
                        <h2 class="text-2xl font-black mb-6">Meus Produtos</h2>
                        <table class="w-full text-left">
                            <thead><tr class="text-white/50 border-b border-white/10"><th>Nome</th><th>Preço</th><th>Ações</th></tr></thead>
                            <tbody id="lista-admin-produtos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const _supabase = supabase.createClient("https://yawousokoaqeyvktjosj.supabase.co", "sb_publishable__TXuxjZ8PObBZxsM-PjF1Q_fAvPsDa3");

        // Funções de Navegação
        function mudarAba(aba) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('aba-' + aba).classList.add('active');
        }

        function mudarSubAba(sub, btn) {
            document.querySelectorAll('.admin-sub-tab').forEach(el => el.classList.remove('active'));
            document.getElementById('sub-' + sub).classList.add('active');
        }

        // Carregar Produtos no Admin
        async function carregarProdutosAdmin() {
            const { data } = await _supabase.from('produtos').select('*');
            const container = document.getElementById('lista-admin-produtos');
            container.innerHTML = data.map(p => `
                <tr class="border-b border-white/5">
                    <td class="p-3">${p.nome}</td>
                    <td class="p-3">R$ ${parseFloat(p.preco).toFixed(2)}</td>
                    <td class="p-3">
                        <button onclick="excluirProduto('${p.id}')" class="text-red-400"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        async function excluirProduto(id) {
            if(confirm('Excluir este produto?')) {
                await _supabase.from('produtos').delete().eq('id', id);
                carregarProdutosAdmin();
                location.reload();
            }
        }

        async function executarLogout() { await _supabase.auth.signOut(); location.reload(); }

        window.onload = () => { carregarProdutosAdmin(); };
    </script>
</body>
</html>
